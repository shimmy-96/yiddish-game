<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>יידיש — הכל למבחן</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --paper:#F4F0E6; --paper-2:#EEE8D9; --card:#FFFDF8; --card-2:#FBF7EE;
  --ink:#1B2A2C; --ink-soft:#4A5A5B; --ink-faint:#7C8A88; --line:#E2D9C6; --line-soft:#EDE6D6;
  --teal:#0E8A7C; --teal-deep:#0B6B60; --teal-soft:#D6ECE7; --coral:#D8593F; --coral-soft:#F6DDD5;
  --gold:#C98A22; --gold-soft:#F3E5C6; --grape:#6B5BB0; --grape-soft:#E4DEF4;
  --good:#1F9E6E; --good-soft:#D3EEE1; --bad:#CC3A2E; --bad-soft:#F5D8D4;
  --shadow:0 1px 2px rgba(27,42,44,.05),0 6px 18px rgba(27,42,44,.08);
  --shadow-lg:0 2px 6px rgba(27,42,44,.06),0 18px 44px rgba(27,42,44,.13);
}
@media (prefers-color-scheme:dark){:root{
  --paper:#12201F; --paper-2:#0E1A19; --card:#1A2A28; --card-2:#213432;
  --ink:#ECE6D6; --ink-soft:#AFC0BC; --ink-faint:#7E918D; --line:#2C3E3B; --line-soft:#25352F;
  --teal:#2FC8B4; --teal-deep:#5FD9C8; --teal-soft:#183430; --coral:#EE7A5F; --coral-soft:#3A231C;
  --gold:#E1AC4E; --gold-soft:#382E19; --grape:#A99CE6; --grape-soft:#282146;
  --good:#3FD08C; --good-soft:#143324; --bad:#F0796B; --bad-soft:#3A1C18;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.35);
  --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 20px 50px rgba(0,0,0,.5);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{direction:rtl;background:var(--paper);color:var(--ink);min-height:100vh;
  font-family:"Assistant","Heebo","Segoe UI",system-ui,-apple-system,"Arial Hebrew",Arial,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased}
.yid{font-family:"Frank Ruhl Libre","Times New Roman","David",serif;direction:rtl;unicode-bidi:isolate;font-weight:600}
.wrap{max-width:640px;margin:0 auto;padding:14px 14px 60px}
a.home{display:inline-block;color:var(--teal-deep);text-decoration:none;font-weight:700;font-size:14px;margin-bottom:8px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tab{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:8px 14px;font-size:14px;font-weight:800;color:var(--ink-soft);cursor:pointer;font-family:inherit}
.tab.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.sbtn{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit}
.sbtn.on{background:var(--teal-deep);color:#fff;border-color:var(--teal-deep)}
.scorebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0}
.spill{background:var(--card-2);border:1px solid var(--line-soft);border-radius:99px;padding:5px 12px;font-weight:800;color:var(--ink-soft);font-size:13px}
.spill b{color:var(--teal-deep)}
.mapbtn{margin-inline-start:auto;border:1px solid var(--line);background:var(--card);border-radius:99px;padding:6px 13px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink)}
.prog{height:8px;background:var(--line-soft);border-radius:99px;overflow:hidden;margin-bottom:14px}
.prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--teal-deep));border-radius:99px;transition:width .4s}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 16px}
.meta{display:flex;justify-content:space-between;align-items:center;color:var(--ink-faint);font-size:12px;font-weight:700;margin-bottom:6px;gap:8px}
.pill{background:var(--teal-soft);color:var(--teal-deep);border-radius:99px;padding:3px 10px;font-size:12px;font-weight:800;white-space:nowrap}
.pill.gold{background:var(--gold-soft);color:var(--gold)}
.qbadge{display:inline-block;font-size:12px;font-weight:800;padding:3px 11px;border-radius:99px;margin-bottom:6px}
.qbadge.ok{background:var(--good-soft);color:var(--good)}
.qbadge.no{background:var(--coral-soft);color:var(--coral)}
.q{font-size:21px;margin:4px 0 2px}
.hint{color:var(--ink-soft);font-size:14px;margin-bottom:8px}
.hint b{color:var(--ink)}
.answer{min-height:56px;border:2px dashed var(--line);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;margin:12px 0}
.answer.empty::before{content:"הקש/י על המילים כדי לבנות את המשפט…";color:var(--ink-faint);font-size:14px;font-weight:600;font-family:"Assistant",sans-serif}
.bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.tile{border:1px solid var(--line);background:var(--card-2);border-radius:10px;padding:8px 13px;font-size:20px;cursor:pointer;box-shadow:0 2px 0 var(--line);transition:transform .08s;font-family:inherit}
.tile:active{transform:translateY(1px)}
.tile.placed{background:var(--teal-soft);border-color:color-mix(in srgb,var(--teal) 45%,var(--line))}
.tile.used{visibility:hidden}
.opt{display:block;width:100%;text-align:right;border:1.5px solid var(--line);background:var(--card-2);border-radius:12px;padding:13px 15px;font-size:20px;margin:8px 0;cursor:pointer;font-family:inherit;color:inherit}
.opt.right{border-color:var(--good);background:var(--good-soft)}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.btn{flex:1;min-width:110px;background:var(--teal);color:#fff;border:none;border-radius:13px;padding:13px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px color-mix(in srgb,var(--teal) 30%,transparent)}
.btn:disabled{opacity:.5}
.btn.ghost{flex:0 0 auto;min-width:0;background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.fb{margin-top:12px;border-radius:12px;padding:12px 14px;font-size:15px;display:none;border-inline-start:4px solid transparent}
.fb.show{display:block}
.fb.ok{background:var(--good-soft);border:1px solid color-mix(in srgb,var(--good) 40%,var(--line));border-inline-start-color:var(--good)}
.fb.no{background:var(--bad-soft);border:1px solid color-mix(in srgb,var(--bad) 40%,var(--line));border-inline-start-color:var(--bad)}
.fb .h{font-weight:800;margin-bottom:4px}
.fb .cor{font-size:20px;margin:4px 0}
.fb .tr{color:var(--ink-soft);font-size:14px}
.done{text-align:center;padding:26px 16px}
.done .big{font-size:44px}
.mh{font-weight:800;margin:16px 0 6px;font-size:15px}
.maplist{display:flex;flex-direction:column;gap:8px}
.maprow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line-soft);border-radius:10px;background:var(--card-2);cursor:pointer;text-align:right}
.maprow:hover{border-color:var(--teal)}
.maprow .st{width:24px;height:24px;border-radius:99px;display:grid;place-items:center;font-weight:900;flex:0 0 auto;font-size:13px}
.maprow .st.ok{background:var(--good-soft);color:var(--good)}
.maprow .st.no{background:var(--coral-soft);color:var(--coral)}
.maprow .st.none{background:var(--line-soft);color:var(--ink-faint)}
.maprow .qt{flex:1;font-size:14px}
.timer{font-weight:800;color:var(--teal-deep);font-variant-numeric:tabular-nums;font-family:ui-monospace,monospace}
footer{color:var(--ink-faint);font-size:12px;text-align:center;margin-top:22px}
.exin{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:16px;background:var(--card-2);color:var(--ink);font-family:"Frank Ruhl Libre",serif}
.exin:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
.exbuilt{min-height:30px;border:1px dashed var(--line);border-radius:8px;padding:5px 9px;font-size:16px;background:var(--card-2);cursor:pointer}
.exbuilt.active{border:2px solid var(--teal);background:var(--teal-soft);box-shadow:0 0 0 3px var(--teal-soft)}
#kbd{position:sticky;bottom:0;z-index:40;background:var(--card);border-top:2px solid var(--teal);box-shadow:0 -6px 20px rgba(27,42,44,.14);border-radius:16px 16px 0 0;padding:10px 12px;margin-top:14px}
#kbd .khd{font-size:12.5px;font-weight:800;color:var(--teal-deep);margin-bottom:7px}
#kbd .kwords{display:flex;flex-wrap:wrap;gap:7px}
#kbd .kw{font-family:"Frank Ruhl Libre",serif;font-size:18px;padding:8px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card-2);color:var(--ink);cursor:pointer;min-height:42px}
#kbd .kw:active{transform:scale(.96)}
#kbd .kctl{font-size:13px;font-weight:700;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper-2);cursor:pointer}
table.conj td{border:1px solid var(--line);padding:6px 8px;vertical-align:middle}
table.conj td.lbl{background:var(--card-2);font-weight:800;white-space:nowrap;width:74px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div style="font-weight:800;font-size:20px;color:var(--teal-deep);margin-bottom:8px">🎯 יידיש — הכל למבחן</div>
  <div class="tabs" id="tabs"></div>
  <div class="scorebar" id="score"></div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px" id="subtabs"></div>
  <div class="prog"><i id="pbar"></i></div>
  <div id="stage"></div>
  <div id="kbd" style="display:none"></div>
  <footer>נתונים: 60 משפטי ההטיה · 3 סיפורים (תשובות המורה) · 25 שיבוצים · הכל מהקורס, אין המצאות</footer>
</div>

<script src="data.js"></script>
<script>
/* ===== stories: teacher's Yiddish model answers (8 per story, ordered) ===== */
const STORIES=[
 {t:"פּעקעלע פּוטער 🕯️",k:"p",items:[
  {q:"ווער זײַנען געווען די נאַציס?",a:"די נאַציס זײַנען געווען דײַטשן מיט ביקסן",he:"הנאצים היו גרמנים עם רובים."},
  {q:"וואָס איז אַ געטאָ?",a:"אַ געטאָ איז אַ קליינער צאָל גאַסן מיט אַ מויער",he:"גטו הוא מספר קטן של רחובות עם חומה."},
  {q:"וואָס האָבן די נאַציס געטאָן די ייִדן פֿון געטאָ?",a:"די נאַציס האָבן די ייִדן פֿון געטאָ פֿאַרגאַזט און פֿאַרברענט",he:"הנאצים הרגו בגז ושרפו את יהודי הגטו."},
  {q:"צוליב וואָס איז וואָלאַדקע געבליבן אויף יענער זײַט מויער?",a:"וואָלאַדקע איז געבליבן אויף יענער זײַט מויער כּדי צו העלפֿן",he:"וולאדקה נשארה בצד השני של החומה כדי לעזור."},
  {q:"ווען האָבן די יונגע העלדישע באַשלאָסן צו מאַכן אַן אויפֿשטאַנד?",a:"די יונגע העלדישע ייִדן האָבן באַשלאָסן צו מאַכן אַן אויפֿשטאַנד ווען עס זײַנען שוין געבליבן ווייניק ייִדן אין געטאָ",he:"כשנשארו כבר מעט יהודים בגטו."},
  {q:"ווי אַזוי האָט וואָלאַדקע געטראָגן דינאַמיט אין געטאָ?",a:"וואָלאַדקע האָט געטראָגן דינאַמיט אין געטאָ אין אַ פּעקעלע פּוטער",he:"בתוך חבילה שנראתה כמו חבילת חמאה."},
  {q:"וואָס איז געשען ווען וואָלאַדקע איז געווען אויף דער מויער פֿון געטאָ?",a:"ווען וואָלאַדקע איז געווען אויף דער מויער פֿון געטאָ האָבן זיך דערהערט שאָסן",he:"נשמעו יריות."},
  {q:"וואָס איז געווען די סכּנה בײַם אַראָפּשפּרינגען פֿון געטאָ מויער?",a:"די סכּנה איז געווען אַז זי קען נאָך פֿאַלן און דאָס פּעקעלע פּוטער קען אויפֿרײַסן",he:"שתיפול והחבילה תתפוצץ."},
 ]},
 {t:"שיסעלע מיט בוימל 🕎",k:"s",items:[
  {q:"ווו שטייט דאָס הייזל?",a:"דאָס הייזל שטייט בײַם עק דאָרף",he:"הבית עומד בקצה הכפר."},
  {q:"פֿאַרוואָס ווונדערן זיך די מענטשן?",a:"די מענטשן ווונדערן זיך וואָס ווי נאָר עס קומט דער ווינטער אַזוי שטעלט אַוועק דער באַלעבאָס יעדן אויף דער נאַכט דאָס שיסעלע מיט בוימל אויפֿן פֿענצטער",he:"מתפלאים שכל חורף בעל הבית מעמיד כל לילה את הקערית על החלון."},
  {q:"ווי אַזוי האָט געהייסן דער בעל-הבית?",a:"דער באַלעבאָס האָט געהייסן אברהם",he:"קראו לו אברהם."},
  {q:"ווען איז די מעשׂה געווען?",a:"די מעשׂה איז געווען מיט אַ צוואַנציק יאָר צוריק",he:"לפני כעשרים שנה."},
  {q:"וואָס האָט געזאָגט דער ערשטער געדאַנק?",a:"דער ערשטער געדאַנק האָט געזאָגט וואָס טוסטו דרעמל ניט אײַן",he:"המחשבה הראשונה: מה אתה עושה? אל תירדם!"},
  {q:"וואָס האָט ער דערזען אין חלום?",a:"ער האָט דערזען אין חלום אַ פֿײַערל",he:"הוא ראה אור/אש קטנה."},
  {q:"וואָס האָט דער אַלטער געזאָגט?",a:"דער אַלטער האָט געזאָגט אויב דו בחור האָסט ליב אַרבעט קענסטו בײַ מיר דאָ פֿאַרבלײַבן",he:"הזקן: אם אתה אוהב עבודה, תוכל להישאר כאן."},
  {q:"וואָס טוט ער יעדן ווינטער?",a:"יעדן ווינטער צינדט ער אָן אַ שיסעלע מיט בוימל",he:"כל חורף הוא מדליק קערית שמן."},
 ]},
 {t:"דער בוים און דאָס יינגל 🌳",k:"b",items:[
  {q:"וועמען האָט דער בוים ליב געהאַט?",a:"דער בוים האָט ליב געהאַט דאָס יינגל",he:"העץ אהב את הילד."},
  {q:"וואָס האָט דאָס יינגל געזאַמלט?",a:"דאָס יינגל האָט געזאַמלט די בלעטער",he:"הילד אסף את העלים."},
  {q:"אין וואָס האָבן זיי זיך געשפּילט?",a:"זיי האָבן זיך געשפּילט אין באַהעלטעניש",he:"הם שיחקו במחבואים."},
  {q:"וואָס האָט דער בוים געגעבן?",a:"דער בוים האָט געגעבן זײַן פֿרוכט",he:"העץ נתן את פירותיו."},
  {q:"פֿאַרוואָס האָט דאָס יינגל געוואָלט אַ שיף?",a:"דאָס יינגל האָט געוואָלט אַ שיף כּדי אַוועקצופֿאָרן",he:"כדי להפליג רחוק."},
  {q:"וואָס האָט דאָס יינגל געטאָן מיט די עפּל?",a:"דאָס יינגל האָט גענומען די עפּל אין מאַרק פֿאַרקויפֿן",he:"לקח את התפוחים למכור בשוק."},
  {q:"פֿאַרוואָס איז דער בוים געווען טרויעריק?",a:"דער בוים איז געווען טרויעריק ווײַל דאָס יינגל איז ניט צוריקגעקומען אַ לאַנגע צײַט",he:"כי הילד לא חזר זמן רב."},
  {q:"פֿאַרוואָס האָט דאָס יינגל געוואָלט אַ הויז?",a:"דאָס יינגל האָט געוואָלט אַ הויז איך וויל אַ ווײַב און קינדער",he:"כי רצה אישה וילדים."},
 ]},
];
const CB=(window.YID&&YID.CONJUGATION_BANK)||[], FB=(window.YID&&YID.FILL_IN_BANK)||[];
const CONJ_FORMS=[['past','עבר'],['future','עתיד'],['imperative','ציווי'],['negative','שלילה'],['positiveQuestion','שאלה +']];
const FORM_LBL={past:'עבר',future:'עתיד',imperative:'ציווי',negative:'שלילה',positiveQuestion:'שאלה +'};

/* ===== persistence ===== */
const LSK='yid_trainer_v1';
let DB={prog:{},mist:[]};
try{DB=Object.assign({prog:{},mist:[]},JSON.parse(localStorage.getItem(LSK)||'{}'))}catch(e){}
function save(){try{localStorage.setItem(LSK,JSON.stringify(DB))}catch(e){}}
function stat(k){return DB.prog[k]||{tries:0,correct:0,wrong:0,ok:false}}
function record(k,ok){const x=DB.prog[k]||{tries:0,correct:0,wrong:0,ok:false};x.tries++;if(ok){x.correct++;x.ok=true;}else x.wrong++;DB.prog[k]=x;save();}

/* ===== helpers ===== */
function norm(s){return (s||'').normalize('NFD').replace(/[֑-ׇ]/g,'')
  .replace(/[.,!?;:'"״׳`\-–—()]/g,'').replace(/\s+/g,' ').trim()
  .replace(/ך/g,'כ').replace(/ם/g,'מ').replace(/ן/g,'נ').replace(/ף/g,'פ').replace(/ץ/g,'צ');}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function verbBucket(v){const t=new Set(v.tags||[]);
  if(t.has('zikh'))return 'zikh';
  if(/\s/.test(v.infinitive)||['זײַן','האָבן'].includes(v.infinitive)||v.infinitive.indexOf('ווער')===0)return 'special';
  if(t.has('prefix_fixed'))return 'inseparable';
  if(t.has('prefix_split'))return 'separable';
  if(t.has('motion'))return 'motion';
  return 'regular';}
const BUCK_LBL={regular:'קל',motion:'בינוני · תנועה',separable:'קשה · מתפרק',inseparable:'קשה · בלתי-מתפרק',zikh:'קשה · זיך',special:'קשה · מיוחד'};
function lev(a,b){const m=a.length,n=b.length,d=[...Array(m+1)].map((_,i)=>[i,...Array(n).fill(0)]);for(let j=1;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function ratio(a,b){const L=Math.max(a.length,b.length);return L?1-lev(a,b)/L:1;}

let EX=null;
function buildExam(n){
  const byB={}; CB.forEach(v=>{(byB[verbBucket(v)]=byB[verbBucket(v)]||[]).push(v);});
  const want=[['regular',2],['motion',2],['separable',2],['inseparable',2],['zikh',1],['special',1]];
  const chosen=[], used=new Set();
  want.forEach(([b,cnt])=>{const arr=byB[b]||[];for(let i=0;i<cnt;i++){if(!arr.length)break;const v=arr[(n*cnt+i)%arr.length];if(v&&!used.has(v.id)){chosen.push(v);used.add(v.id);}}});
  const all=CB.slice(); let ai=(n*7)%all.length;
  while(chosen.length<10){const v=all[ai++%all.length];if(!used.has(v.id)){chosen.push(v);used.add(v.id);}if(ai>all.length*2)break;}
  const verbs=chosen.slice(0,10);
  const storyKey=['p','p','b','b','s','s'][n%6];
  const slots=verbs.map(v=>({verbId:v.id,sentence:v.presentSentence,ans:PRES[v.id]||v.infinitive}));
  const bank=slots.map(s=>s.ans);
  // deterministic-ish scramble by index so bank order is stable per exam
  const bankShuf=bank.slice().sort((a,b)=>(a+n).length-(b+n).length||a.localeCompare(b));
  return {no:n, verbs, storyKey, slots, bank:bankShuf};
}

const KDISTRACT=['נישט','קיין','צי','געווען','וועט','זיך','אַ','די','אין','מיט','האָט','איז'];

function kbdWordsFor(){if(!DB.active)return[];const{kind,a,b}=DB.active;

   negative:['לשלול את המשפט',(t.has('nisht_keyn')?'המושא לא-מיודע → נישט קיין':'בדוק אם המושא לא-מיודע'),'נישט / נישט קיין לפי הכלל','מתחיל ב־'+(v.negative||'').split(' ').slice(0,2).join(' ')],

function fieldOk(user,field,v){const u=norm(user);if(!u)return false;let acc;
  if(field==='imperative')acc=(v.imperative||'').split(/\s+/).map(x=>x.replace(/[!]/g,'')).filter(Boolean).concat([v.imperative]);
  else if(field==='positiveQuestion')acc=(v.positiveQuestion||'').split('?').map(s=>s.trim()).filter(Boolean);
  else acc=[v[field]||''];
  return acc.some(a=>{const na=norm(a);return na===u||(field==='translation'&&na&&ratio(u,na)>=0.7);});}
function whyFor(v,field){const t=new Set(v.tags||[]);
  if(field==='past')return (t.has('zayn')||t.has('motion'))?'פועל תנועה → עבר עם זײַן.':(t.has('prefix_fixed')?'בלתי-מתפרק → בלי גע בעבר.':'עבר עם האָבן + גע___ט.');
  if(field==='negative')return t.has('nisht_keyn')?'מושא לא-מיודע → נישט קיין.':'נישט (מיודע / תואר).';
  if(field==='positiveQuestion')return 'שאלה+ = עם צי.';
  if(field==='negativeQuestion')return 'שאלה− = בלי צי, היפוך סדר.';
  if(field==='future')return 'עתיד = וועלן + שם הפועל.';
  if(field==='imperative')return 'ציווי: השורש (יחיד), +ט (רבים).';
  if(field==='translation')return 'בדוק את התרגום מול ההווה.';
  return v.explanation||'בדוק את הצורה.';}
function gradeExam(){
  const res={parts:{a:{pts:0,max:70},b:{pts:0,max:24},c:{pts:0,max:10}},mistakes:[],weak:{}};
  EX.verbs.forEach((v,vi)=>FORM_FIELDS.forEach(([field,label])=>{
    const user=getConj(v.id,field);
    if(fieldOk(user,field,v))res.parts.a.pts++;
    else{const tp=FIELD_TOPIC[field];res.weak[tp]=(res.weak[tp]||0)+1;
      res.mistakes.push({part:'א׳',pos:'משפט '+(vi+1)+' · '+label,q:v.presentSentence+' · '+v.infinitive,mine:user||'—',correct:correctFor(v,field),why:whyFor(v,field),topic:tp});}
  }));
  const st=STORIES.find(s=>s.k===EX.storyKey);
  st.items.forEach((it,qi)=>{const user=getStoryA(qi),r=ratio(norm(user),norm(it.a));let pts=0;
    if(user){if(r>=0.85)pts=3;else if(r>=0.5)pts=2;else if(user.trim().split(/\s+/).length>=3)pts=1;}
    res.parts.b.pts+=pts;
    if(pts<2){res.weak['סיפורים']=(res.weak['סיפורים']||0)+1;
      res.mistakes.push({part:'ב׳',pos:'שאלה '+(qi+1),q:it.q,mine:user||'—',correct:it.a,why:'עונים במשפט שלם ביידיש.',topic:'סיפורים'});}
  });
  EX.slots.forEach((s,k)=>{const user=getCloze(s.verbId);
    if(norm(user)===norm(s.ans)&&user)res.parts.c.pts++;
    else{res.weak['שיבוצים']=(res.weak['שיבוצים']||0)+1;
      res.mistakes.push({part:'ג׳',pos:'שיבוץ '+(k+1),q:s.sentence,mine:user||'—',correct:s.ans,why:'קודם גוף → צורת פועל → משמעות.',topic:'שיבוצים'});}
  });
  DB.exGraded=DB.exGraded||{};DB.exGraded[EX.no]=res;
  DB.examWeak=DB.examWeak||{};Object.entries(res.weak).forEach(([t,c])=>{DB.examWeak[t]=(DB.examWeak[t]||0)+c;});
  save();renderExam();
}

  const lvl=pct>=90?'מוכן מאוד 🏆':pct>=80?'טוב — לחזק טעויות 💪':pct>=65?'צריך עוד חזרה 📚':'לחזור למדריך 🔴';

/* ===== step / render ===== */
function step(){
  renderTabs();renderSub();renderScore();
  if(qpos>=queue.length)return (mode==='exam')?finishExam():finishRun();
  cur=queue[qpos];answered=false;placed=[];
  if(cur.kind==='build'){
    const words=cur.answer.split(' ');
    let extras=[];
    if(words.length<=8){const pool=(cur.poolCat==='story'?STORY_WORDS:conjWords(conjForm));extras=shuffle(pool.filter(w=>!words.includes(w))).slice(0,3);}
    bank=shuffle(words.concat(extras)).map((w,idx)=>({w,idx,used:false}));
  }
  setBar();render();
}
function render(){
  const st=stat(cur.key);
  const badge=(mode!=='exam')?(st.ok?`<span class="qbadge ok">✓ ענית נכון (×${st.correct})</span>`:(st.tries>0?`<span class="qbadge no">📌 טעית ${st.wrong}×</span>`:'')):'';
  const part = cur.cat==='הטיה'?'חלק א׳':cur.cat==='סיפור'?'חלק ב׳':'חלק ג׳';
  const metaRight = mode==='exam'?`<span class="pill gold">${part} · ${qpos+1}/${queue.length}</span> <span class="timer" id="etimer">00:00</span>`
                                 :`<span class="pill">${qpos+1}/${queue.length}</span>`;
  let body='';
  if(cur.kind==='build'){
    body=`<div class="answer ${placed.length?'':'empty'}">${placed.map((p,i)=>`<button class="tile placed yid" onclick="unplace(${i})">${p.w}</button>`).join('')}</div>
      <div class="bank">${bank.map(t=>`<button class="tile yid ${t.used?'used':''}" onclick="place(${t.idx})">${t.w}</button>`).join('')}</div>
      <div class="row"><button class="btn" id="chk" onclick="checkBuild()" ${placed.length?'':'disabled'}>בדוק</button>
      <button class="btn ghost" onclick="clearAns()">נקה</button>${mode==='exam'?'':'<button class="btn ghost" onclick="revealAns()">גלה</button>'}</div>`;
  } else {
    body=`<div>${shuffle(cur.options).map(o=>`<button class="opt yid" onclick="pickAns(this,'${btoa(encodeURIComponent(o))}')">${o}</button>`).join('')}</div>`;
  }
  document.getElementById('stage').innerHTML=`<div class="card">
    <div class="meta"><div>${metaRight}</div><span>${cur.tag}</span></div>
    ${badge?`<div>${badge}</div>`:''}
    ${cur.head}
    ${body}
    <div class="fb" id="fb"></div></div>`;
}
function place(idx){if(answered)return;const t=bank.find(b=>b.idx===idx);if(!t||t.used)return;t.used=true;placed.push(t);render();}
function unplace(i){if(answered)return;const t=placed.splice(i,1)[0];const b=bank.find(x=>x.idx===t.idx);if(b)b.used=false;render();}
function clearAns(){if(answered)return;placed=[];bank.forEach(b=>b.used=false);render();}

function resolve(ok,revealMode){
  answered=true;
  if(mode==='exam'){ if(!revealMode){ if(ok){exam.correct++;removeMist(cur.key);} else {exam.wrong.push(cur.key);addMist(cur.key);} } }
  else if(!revealMode){ record(cur.key,ok); }
  const fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'ok':'no');
  const head=revealMode?'התשובה:':(ok?'✔ נכון!':'✘ לא מדויק — הנכונה:');
  fb.innerHTML=`<div class="h">${head}</div><div class="cor">${cur.reveal}</div>`
    +`<div class="row" style="margin-top:10px"><button class="btn" onclick="next()">${qpos>=queue.length-1?'סיום ←':'הבא ←'}</button></div>`;
  renderScore();
}
function checkBuild(){resolve(norm(placed.map(p=>p.w).join(' '))===norm(cur.answer),false);const c=document.getElementById('chk');if(c)c.disabled=true;}
function revealAns(){resolve(true,true);}
function pickAns(btn,enc){
  if(answered)return;const val=decodeURIComponent(atob(enc));const ok=norm(val)===norm(cur.correct);
  const box=btn.parentNode;[...box.children].forEach(b=>b.disabled=true);
  if(ok)btn.classList.add('right');else{btn.classList.add('wrong');[...box.children].forEach(b=>{if(norm(b.textContent)===norm(cur.correct))b.classList.add('right');});}
  resolve(ok,false);
}
function next(){qpos++;step();}

function addMist(k){if(!DB.mist.includes(k)){DB.mist.push(k);if(DB.mist.length>60)DB.mist.shift();save();}}
function removeMist(k){const i=DB.mist.indexOf(k);if(i>=0){DB.mist.splice(i,1);save();}}

function examReviewWrong(keys){
  const items=(keys||[]).map(qFromKey).filter(Boolean);

  exam.timerId=setInterval(()=>{const el=document.getElementById('etimer');if(el){const s=Math.floor((performance.now()-start)/1000);el.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}},1000);

/* ===== מדריך קבוע + סימון נושאים חלשים ===== */
function weakByTopic(){
  const w={}, map={past:'עבר',future:'עתיד',imperative:'ציווי',negative:'שלילה',positiveQuestion:'שאלה'};
  const bump=(t,x)=>{if(!x.tries)return;w[t]=w[t]||{ok:0,wrong:0};if(x.ok)w[t].ok++;else w[t].wrong++;};
  Object.entries(DB.prog).forEach(([k,x])=>{
    if(k[0]==='c')bump(map[k.split('_')[2]]||'עבר',x);
    else if(k[0]==='s')bump('סיפורים',x);
    else if(k[0]==='f')bump('שיבוצים',x);
  });
  Object.entries(DB.examWeak||{}).forEach(([t,n])=>{w[t]=w[t]||{ok:0,wrong:0};w[t].wrong+=n;});
  return w;
}
function tdot(topic,W){const o=W[topic];
  if(!o||(!o.ok&&!o.wrong))return '<span class="qbadge" style="background:var(--line-soft);color:var(--ink-faint)">טרם</span>';
  if(o.wrong>=3)return '<span class="qbadge no">חלש · '+o.wrong+' טעויות</span>';
  if(o.wrong>=1)return '<span class="qbadge" style="background:var(--gold-soft);color:var(--gold)">בינוני · '+o.wrong+'</span>';
  return '<span class="qbadge ok">שולט ✓</span>';}
function renderGuide(){
  renderTabs();renderScore();document.getElementById('subtabs').innerHTML='';document.getElementById('pbar').style.width='0%';
  const W=weakByTopic();
  const y=s=>`<span class="yid">${s}</span>`;
  const T=(title,badge,html)=>`<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px"><h3 style="font-size:17px;margin:0">${title}</h3>${badge||''}</div>${html}</div>`;
  let h='';
  h+=T('גופים בהווה — סיומות הפועל','',
    `<table class="conj"><tbody>
     <tr><td class="lbl">איך</td><td>צורה קצרה (השורש)</td></tr>
     <tr><td class="lbl">דו</td><td>בדרך כלל ־סט</td></tr>
     <tr><td class="lbl">ער/זי/עס</td><td>בדרך כלל ־ט</td></tr>
     <tr><td class="lbl">מיר</td><td>־ן / ־ען</td></tr>
     <tr><td class="lbl">איר</td><td>בדרך כלל ־ט</td></tr>
     <tr><td class="lbl">זיי</td><td>־ן / ־ען</td></tr></tbody></table>
     <div class="hint" style="margin-top:6px">חריג: שורש שנגמר ב־ט (אַרבעט, וואַרט) לא מקבל ט נוסף → איך/ער/איר = ${y('אַרבעט')}.</div>`);
  h+=T('עתיד',tdot('עתיד',W),`עזר <b>וועלן</b> + שם הפועל: ${y('איך וועל · דו וועסט · ער וועט · מיר וועלן · איר וועט · זיי וועלן')} + פועל במקור.`);
  h+=T('עבר — האָבן או זײַן?',tdot('עבר',W),
    `פועל <b>תנועה של כל הגוף</b> (גיין · קומען · פֿאָרן · לויפֿן · שווימען · קריכן · שלאָפֿן) → עזר ${y('זײַן')}. שאר הפעלים → ${y('האָבן')} + גע___ט.
     <div class="hint" style="margin-top:6px">חריג: ${y('טאַנצן')} עם האָבן; ${y('ווערן')} עם זײַן (איז געוואָרן).</div>
     <table class="conj" style="margin-top:8px"><tbody><tr><td class="lbl">האָבן</td><td>${y('איך האָב · דו האָסט · ער האָט · מיר/זיי האָבן · איר האָט')}</td></tr>
     <tr><td class="lbl">זײַן</td><td>${y('איך בין · דו ביסט · ער איז · מיר/זיי זײַנען · איר זײַט')}</td></tr></tbody></table>`);
  h+=T('פעלים מתפרקים','',`בהווה ובציווי התחילית נפרדת; בעבר ${y('גע')} נכנס באמצע: ${y('אַרויספֿאָרן → אַרויסגעפֿאָרן · אָפּקויפֿן → אָפּגעקויפֿט · אויסלייענען → אויסגעלייענט')}.`);
  h+=T('פעלים בלתי-מתפרקים','',`תחיליות ${y('באַ · פֿאַר · דער · צע · אַנט')} — <b>אין גע בעבר</b>: ${y('פֿאַרקויפֿן → פֿאַרקויפֿט · דערציילן → דערציילט · צעברעכן → צעבראָכן · אַנטלויפֿן → אַנטלאָפֿן')}.`);
  h+=T('פעלים עם זיך','',`לא לשכוח ${y('זיך')} בכל זמן: ${y('וואַשן זיך · באַקענען זיך · פֿאַרשרײַבן זיך · פֿאַרקוקן זיך')}.`);
  h+=T('שלילה — נישט / נישט קיין',tdot('שלילה',W),
    `${y('נישט')} = שלילה רגילה / תואר / מושא <b>מיודע</b> (די/דעם). ${y('נישט קיין')} = שם עצם <b>לא מיודע</b> / אַ / מספר / כמות.
     <div class="hint" style="margin-top:6px">${y('ער שרײַבט נישט קיין בריוו')} · ${y('זי איז נישט די שענסטע')}.</div>`);
  h+=T('שאלות (בהטיות)',tdot('שאלה',W),`${y('שאלה+')} = כן/לא <b>עם צי</b>. ${y('שאלה−')} = כן/לא <b>בלי צי</b>, היפוך סדר. דו מתמזג: ${y('גייסטו · קומסטו')}.`);
  h+=T('סיפורים — מילות שאלה ופתיחים',tdot('סיפורים',W),
    `${y('ווער')}=מי · ${y('וואָס')}=מה · ${y('ווען')}=מתי · ${y('ווי אַזוי')}=איך · ${y('פֿאַרוואָס')}=למה · ${y('וווּ')}=איפה.
     <div class="hint" style="margin-top:6px">"מחזרים" את השאלה בתשובה: ${y('ווו שטייט דאָס הייזל? → דאָס הייזל שטייט…')}. עונים במשפט שלם ביידיש.</div>`);
  h+=T('שיבוצים — איך פותרים',tdot('שיבוצים',W),`הסדר: <b>קודם גוף → צורת פועל → משמעות</b>. ${y('סט')}→דו · ${y('ט')}→ער/איר · ${y('ן')}→מיר/זיי. כל מילה מהמחסן פעם אחת.`);
  h+=`<div class="card" style="margin-bottom:12px"><h3 style="font-size:17px;margin:0 0 8px">📎 עוד באותו מקום</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
    <a class="btn ghost" href="tests.html">🧾 6 מבחנים מלאים להדפסה (עם מפתח)</a>
    <a class="btn ghost" href="sheet.html">📄 דף נוסחאות + מבחן קצר</a>
    <a class="btn ghost" href="guide.html">📖 המדריך המאויר המלא</a>
    <a class="btn ghost" href="game.html">🕹️ המשחק (מצב סולם + לבבות)</a>
    </div></div>`;
  document.getElementById('stage').innerHTML=h;
  window.scrollTo(0,0);
}
function toggleMap(){view=view==='map'?'play':'map';if(view==='map')renderMap();else setMode(mode);}
function renderMap(){
  renderTabs();renderSub();renderScore();document.getElementById('pbar').style.width='0%';
  let rows='';
  const list=(label,keys,qlabelFn)=>{
    rows+=`<div class="mh">${label}</div><div class="maplist">`;
    keys.forEach(k=>{const x=stat(k),cls=x.ok?'ok':(x.tries>0?'no':'none'),sym=x.ok?'✓':(x.tries>0?'✗':'•');
      const note=x.ok?`×${x.correct}`:(x.tries>0?`טעות ×${x.wrong}`:'טרם');
      rows+=`<div class="maprow" onclick="jump('${k}')"><span class="st ${cls}">${sym}</span><span class="qt yid">${qlabelFn(k)}</span><span style="color:var(--ink-faint);font-size:12px;white-space:nowrap">${note}</span></div>`;});
    rows+=`</div>`;
  };
  if(mode==='conj'){const lbl=(CONJ_FORMS.find(f=>f[0]===conjForm)||[])[1];
    list(`הטיות — ${lbl} (${CB.length} פעלים)`,CB.map(v=>'c_'+v.id+'_'+conjForm),k=>{const v=CB.find(x=>'c_'+x.id+'_'+conjForm===k);return v?v.infinitive+' · '+v.presentSentence:k;});}
  else if(mode==='story'){const s=STORIES[storyIdx];list(s.t,s.items.map((_,i)=>'s_'+s.k+'_'+i),k=>{const qi=+k.split('_')[2];return s.items[qi].q;});}
  else {const arr=(fillType==='all'?FB:FB.filter(x=>x.type===fillType));list('שיבוצים',arr.map(x=>'f_'+x.id),k=>{const it=FB.find(x=>'f_'+x.id===k);return it?it.prompt:k;});}
  document.getElementById('stage').innerHTML=`<div class="card"><h2 style="font-size:20px">📊 מה צריך לתרגל</h2>
    <p style="color:var(--ink-soft);font-size:14px;margin-top:4px">הקש/י על שורה כדי לקפוץ אליה.</p>${rows}
    <div class="row" style="margin-top:16px"><button class="btn ghost" onclick="resetAll()">אפס ניקוד</button></div></div>`;
}
function jump(k){const q=qFromKey(k);if(!q)return;queue=[q];qpos=0;view='play';step();}
function resetAll(){if(confirm('לאפס את כל הניקוד, ההתקדמות והטעויות?')){DB={prog:{},mist:[]};save();renderMap();}}

if(!CB.length){document.getElementById('stage').innerHTML='<div class="card">שגיאה: קובץ הנתונים לא נטען. ודא ש-data.js קיים לצד הדף.</div>';}
else{ setMode('guide'); }
</script>
