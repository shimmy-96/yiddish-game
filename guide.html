<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🎮 יידיש-קוועסט</title>
<style>*{margin:0;padding:0;box-sizing:border-box}</style>
<style>
/* ============ יידיש-קוועסט — design system (aligned with Stats Wizard Quest) ============ */
:root{
  --paper:#F4F0E6; --paper-2:#EEE8D9; --card:#FFFDF8; --card-2:#FBF7EE;
  --ink:#1B2A2C; --ink-soft:#4A5A5B; --ink-faint:#7C8A88;
  --line:#E2D9C6; --line-soft:#EDE6D6;
  --teal:#0E8A7C; --teal-deep:#0B6B60; --teal-soft:#D6ECE7;
  --coral:#D8593F; --coral-soft:#F6DDD5;
  --gold:#C98A22; --gold-soft:#F3E5C6;
  --grape:#6B5BB0; --grape-soft:#E4DEF4;
  --good:#1F9E6E; --good-soft:#D3EEE1;
  --bad:#CC3A2E; --bad-soft:#F5D8D4;
  --shadow:0 1px 2px rgba(27,42,44,.04),0 6px 18px rgba(27,42,44,.07);
  --shadow-lg:0 2px 6px rgba(27,42,44,.06),0 18px 44px rgba(27,42,44,.13);
  --r:16px; --r-sm:10px; --r-lg:22px;
  --font:"Assistant","Heebo","Segoe UI",system-ui,-apple-system,"Arial Hebrew",Arial,sans-serif;
  /* aliases kept so existing markup keeps working */
  --bg:var(--paper); --bg2:var(--card-2); --muted:var(--ink-soft); --teal2:var(--teal-deep);
  --tealbg:var(--teal-soft); --gold-c:var(--gold); --goldbg:var(--gold-soft);
  --red:var(--bad); --redbg:var(--bad-soft); --green:var(--good); --greenbg:var(--good-soft);
}
@media (prefers-color-scheme:dark){:root{
  --paper:#12201F; --paper-2:#0E1A19; --card:#1A2A28; --card-2:#213432;
  --ink:#ECE6D6; --ink-soft:#AFC0BC; --ink-faint:#7E918D;
  --line:#2C3E3B; --line-soft:#25352F; --teal:#2FC8B4; --teal-deep:#5FD9C8; --teal-soft:#183430;
  --coral:#EE7A5F; --coral-soft:#3A231C; --gold:#E1AC4E; --gold-soft:#382E19;
  --grape:#A99CE6; --grape-soft:#282146; --good:#3FD08C; --good-soft:#143324;
  --bad:#F0796B; --bad-soft:#3A1C18;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.35);
  --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 20px 50px rgba(0,0,0,.5);
}}
:root[data-theme="light"]{
  --paper:#F4F0E6; --paper-2:#EEE8D9; --card:#FFFDF8; --card-2:#FBF7EE;
  --ink:#1B2A2C; --ink-soft:#4A5A5B; --ink-faint:#7C8A88;
  --line:#E2D9C6; --line-soft:#EDE6D6; --teal:#0E8A7C; --teal-deep:#0B6B60; --teal-soft:#D6ECE7;
  --coral:#D8593F; --coral-soft:#F6DDD5; --gold:#C98A22; --gold-soft:#F3E5C6;
  --grape:#6B5BB0; --grape-soft:#E4DEF4; --good:#1F9E6E; --good-soft:#D3EEE1;
  --bad:#CC3A2E; --bad-soft:#F5D8D4;
  --shadow:0 1px 2px rgba(27,42,44,.04),0 6px 18px rgba(27,42,44,.07);
  --shadow-lg:0 2px 6px rgba(27,42,44,.06),0 18px 44px rgba(27,42,44,.13);
}
:root[data-theme="dark"]{
  --paper:#12201F; --paper-2:#0E1A19; --card:#1A2A28; --card-2:#213432;
  --ink:#ECE6D6; --ink-soft:#AFC0BC; --ink-faint:#7E918D;
  --line:#2C3E3B; --line-soft:#25352F; --teal:#2FC8B4; --teal-deep:#5FD9C8; --teal-soft:#183430;
  --coral:#EE7A5F; --coral-soft:#3A231C; --gold:#E1AC4E; --gold-soft:#382E19;
  --grape:#A99CE6; --grape-soft:#282146; --good:#3FD08C; --good-soft:#143324;
  --bad:#F0796B; --bad-soft:#3A1C18;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.35);
  --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 20px 50px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--font); line-height:1.65; -webkit-font-smoothing:antialiased; text-align:right;
  -webkit-text-size-adjust:100%;
  background-image:radial-gradient(circle at 12% 8%,var(--paper-2) 0,transparent 45%),radial-gradient(circle at 88% 92%,var(--paper-2) 0,transparent 45%);
}
button{font-family:inherit}
:focus-visible{outline:2.5px solid var(--teal);outline-offset:2px;border-radius:6px}
.yi{font-family:"Frank Ruhl Libre","Times New Roman","David",serif; direction:rtl; font-weight:600;}
.wrap{max-width:960px;margin:0 auto;padding:6px 20px 100px;}
.view{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* ---- header ---- */
header.top{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--paper) 86%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft)}
.topbar{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:11px;padding:11px 20px;flex-wrap:wrap}
.brand{font-weight:800;font-size:19px;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:8px}
.brand .logo{font-size:20px;filter:drop-shadow(0 2px 3px rgba(14,138,124,.35))}
.brand b{color:var(--teal-deep)}
.brand small{font-weight:600;color:var(--ink-soft);font-size:12px;display:block;margin-top:-3px}
.spacer{flex:1}
.hd-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pbar{height:7px;background:var(--line-soft);border-radius:99px;overflow:hidden;width:120px;max-width:180px}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-deep));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px color-mix(in srgb,var(--teal) 60%,transparent)}
.hstat{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-soft);background:color-mix(in srgb,var(--card-2) 82%,transparent);border:1px solid var(--line-soft);border-radius:99px;padding:4px 11px;white-space:nowrap}
.hstat .hdot{width:7px;height:7px;border-radius:99px;background:var(--ink-faint)}
.hstat b{color:var(--ink);font-weight:800;font-variant-numeric:tabular-nums;margin-inline-start:2px}
.hstat.s-xp .hdot{background:var(--gold);box-shadow:0 0 8px color-mix(in srgb,var(--gold) 65%,transparent)}
.hstat.s-mist .hdot{background:var(--coral);box-shadow:0 0 8px color-mix(in srgb,var(--coral) 65%,transparent)}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--card);
  border:1px solid var(--line);box-shadow:var(--shadow);transition:transform .15s,background .2s;font-size:16px;cursor:pointer;color:var(--ink)}
.iconbtn:hover{transform:translateY(-1px);background:var(--card-2)}
nav.tabs{display:flex;gap:8px;overflow-x:auto;padding:10px 20px 0;max-width:960px;margin:0 auto;-webkit-overflow-scrolling:touch}
nav.tabs button{white-space:nowrap;padding:8px 14px;border-radius:99px;font-size:13.5px;font-weight:700;
  background:var(--card);border:1px solid var(--line);color:var(--ink-soft);cursor:pointer;transition:.18s}
nav.tabs button:hover:not(.active){background:var(--card-2)}
nav.tabs button.active{background:var(--teal);color:#fff;border-color:var(--teal)}
/* ---- generic ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin:16px 0}
h1{font-size:clamp(26px,4vw,34px);margin:.2em 0;line-height:1.2;font-weight:800;letter-spacing:-.01em}
h2{font-size:22px;margin:.4em 0;font-weight:800;letter-spacing:-.01em}
h3{font-size:16px;margin:.4em 0;font-weight:800}
.muted{color:var(--ink-soft)}
.sub{color:var(--ink-soft);font-size:14.5px;margin-top:2px}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--teal-deep)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:13px;padding:12px 22px;
  font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px color-mix(in srgb,var(--teal) 40%,transparent);transition:transform .15s,filter .2s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn.ghost:hover{background:var(--card-2);filter:none}
.btn.gold{background:var(--gold);box-shadow:0 4px 14px color-mix(in srgb,var(--gold) 40%,transparent)}
.btn.coral{background:var(--coral);box-shadow:0 4px 14px color-mix(in srgb,var(--coral) 40%,transparent)}
.btn.sm{padding:8px 15px;font-size:13px;border-radius:10px}
.btn.wide{width:100%}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
/* topic cards */
.tile{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:20px;cursor:pointer;transition:transform .18s,box-shadow .25s,border-color .2s;text-align:right;overflow:hidden;
  display:flex;flex-direction:column;gap:6px;min-height:150px}
.tile::before{content:"";position:absolute;inset-inline:0;top:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--grape));transform:scaleX(0);transform-origin:right;transition:transform .3s ease}
.tile:hover::before{transform:scaleX(1)}
.tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--teal) 45%,var(--line))}
.tile .emo{font-size:30px}
.tile h3{font-size:18px;margin:.2em 0 0}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--teal-soft);color:var(--teal-deep);border-radius:99px;padding:3px 11px;font-size:12px;font-weight:700}
.pill.gold{background:var(--gold-soft);color:var(--gold)}
.pill.red{background:var(--coral-soft);color:var(--coral)}
.pill.green{background:var(--good-soft);color:var(--good)}
/* hero */
.hero{text-align:center;padding:14px 0 6px}
.hero .logo{font-size:52px;display:inline-block;animation:bob 4s ease-in-out infinite;filter:drop-shadow(0 8px 12px rgba(14,138,124,.3))}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-9px) rotate(4deg)}}
.hero h1{background:linear-gradient(120deg,var(--teal-deep),var(--grape));-webkit-background-clip:text;background-clip:text;color:transparent;margin:12px 0 6px}
.hero .sub{font-size:clamp(15px,2vw,18px);font-weight:700;color:var(--ink)}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
/* progress ring */
.ringrow{display:flex;align-items:center;justify-content:center;gap:22px;margin:22px auto 6px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 24px;box-shadow:var(--shadow)}
.ring{--p:0;width:112px;height:112px;border-radius:50%;flex:0 0 auto;
  background:conic-gradient(var(--teal) calc(var(--p)*1%),var(--line-soft) 0);display:grid;place-items:center;
  transition:background .6s cubic-bezier(.4,0,.2,1)}
.ring i{width:86px;height:86px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-style:normal;font-weight:800;font-size:23px;color:var(--teal-deep);font-variant-numeric:tabular-nums}
.stat{display:flex;gap:12px;flex-wrap:wrap}
.kpi{background:var(--card-2);border:1px solid var(--line-soft);border-radius:12px;padding:10px 14px;min-width:100px;text-align:center}
.kpi b{font-size:22px;display:block;font-variant-numeric:tabular-nums}
.kpi span{font-size:12px;color:var(--ink-soft)}
/* conjugation table */
table.conj{width:100%;border-collapse:collapse;margin-top:10px;border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
table.conj td{border:1px solid var(--line);padding:9px 12px;vertical-align:middle}
table.conj td.lbl{background:var(--card-2);font-weight:800;white-space:nowrap;width:96px;font-size:14px}
table.conj input, table.conj .ans{width:100%;border:none;background:transparent;font-family:inherit;font-size:17px;color:var(--ink);padding:4px}
table.conj input:focus{outline:none;box-shadow:0 0 0 3px var(--teal-soft);border-radius:8px}
.rowres{padding:8px 12px;border-radius:10px;margin-top:5px;font-size:14px;border:1px solid var(--line-soft)}
.ok{background:var(--good-soft);color:var(--good);border-color:color-mix(in srgb,var(--good) 35%,var(--line))}
.bad{background:var(--bad-soft);color:var(--bad);border-color:color-mix(in srgb,var(--bad) 35%,var(--line))}
.correct-line{font-weight:800}
/* options */
.opt{display:flex;align-items:center;gap:10px;width:100%;text-align:right;border:1.6px solid var(--line);background:var(--card-2);
  border-radius:12px;padding:12px 15px;margin:7px 0;cursor:pointer;font-size:15px;font-weight:600;transition:.16s}
.opt:hover{border-color:var(--teal);background:var(--teal-soft)}
.opt.sel{border-color:var(--teal);background:var(--teal-soft)}
.opt.right{border-color:var(--good);background:var(--good-soft)}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
/* callouts */
.expl{background:var(--gold-soft);border-inline-start:4px solid var(--gold);padding:11px 14px;border-radius:10px;margin-top:12px;font-size:14px;color:var(--ink)}
.review{background:var(--coral-soft);border-inline-start:4px solid var(--coral);padding:9px 13px;border-radius:10px;margin:8px 0;font-size:13px;color:var(--ink)}
/* level toggle */
.levels{display:inline-flex;gap:4px;margin:12px 0;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:4px;width:100%}
.levels button{flex:1;border:none;background:transparent;border-radius:9px;padding:9px;cursor:pointer;font-weight:800;font-size:13px;color:var(--ink-soft);transition:.16s}
.levels button.on{color:#fff;background:var(--teal)}
/* conj filter bar + mastery + full table (added) */
.fbar{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fchip{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:5px 12px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;transition:.15s;font-family:inherit}
.fchip:hover{border-color:var(--teal)}
.fchip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.chip{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:99px}
.chip.strong{background:var(--good-soft);color:var(--good)}
.chip.mid{background:var(--gold-soft);color:var(--gold)}
.chip.weak{background:var(--bad-soft);color:var(--bad)}
.alltbl{font-size:13px}
.alltbl th{background:var(--card-2);font-weight:800;padding:8px 10px;text-align:right;border:1px solid var(--line);white-space:nowrap}
.alltbl td{font-size:14.5px;vertical-align:top}
.mini{font-size:11px;color:var(--ink-faint);font-weight:600;margin-top:2px}
/* flashcards */
.flash{perspective:1200px;margin:16px 0}
.flash-inner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:240px}
.flash.flip .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;display:flex;flex-direction:column;justify-content:center}
.flash-back{transform:rotateY(180deg)}
/* story */
.linebyline{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.linebyline>div{padding:8px 12px;border-bottom:1px solid var(--line-soft)}
.linebyline .l-yi{background:var(--card-2)}
.storytext{font-size:19px;line-height:2;background:var(--card-2);border:1px solid var(--line-soft);border-radius:12px;padding:16px}
.tag{display:inline-block;background:var(--card-2);border:1px solid var(--line-soft);border-radius:99px;padding:3px 10px;font-size:11px;margin:2px;color:var(--ink-soft);font-weight:600}
/* mistakes bars */
.barrow{display:flex;align-items:center;gap:8px;margin:6px 0}
.barrow .bar{flex:1;height:12px;background:var(--card-2);border-radius:99px;overflow:hidden}
.barrow .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--coral),var(--gold));border-radius:99px}
/* section banner */
.banner{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;color:var(--teal-deep);margin:20px 0 8px}
.banner::after{content:"";flex:1;height:1px;background:var(--line)}
.hidden{display:none!important}
.toast{position:fixed;bottom:22px;right:50%;transform:translateX(50%);background:var(--teal-deep);color:#fff;padding:11px 20px;border-radius:99px;box-shadow:var(--shadow-lg);z-index:80;font-weight:800;font-size:14px;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
.fab{position:fixed;bottom:16px;inset-inline-start:16px;z-index:60}
.fab .btn{border-radius:99px;box-shadow:var(--shadow-lg)}
.floatbtn{position:fixed;bottom:16px;inset-inline-start:16px;z-index:60;border-radius:99px!important;box-shadow:var(--shadow-lg)}
ul.golden{margin:6px 0;padding-inline-start:20px}
ul.golden li{margin:5px 0}
.small{font-size:13px}
.timerbox{font-weight:800;font-size:16px;color:var(--teal-deep);font-variant-numeric:tabular-nums;font-family:ui-monospace,monospace}
footer.ft{text-align:center;padding:30px 20px 90px;color:var(--ink-faint);font-size:13px}
@media(max-width:560px){.linebyline{grid-template-columns:1fr}.ring{width:100px;height:100px}.ring i{width:76px;height:76px;font-size:19px}.hd-stats .pbar{display:none}.floatbtn span.lbl{display:none}}
@media print{header.top,nav.tabs,.floatbtn,.fab,footer.ft,.btn,.iconbtn{display:none!important}body{background:#fff}}
</style>
</head>
<body>
<header class="top">
  <div class="topbar">
    <div class="brand" onclick="go('home')"><span class="logo">🎮</span><span>יידיש-<b>קוועסט</b><small>מאמן למבחן — לפי החומר האמיתי בלבד</small></span></div>
    <div class="spacer"></div>
    <div class="hd-stats">
      <div class="pbar" title="התקדמות כללית"><i id="gpbar" style="width:0%"></i></div>
      <span class="hstat s-xp" title="נקודות ניסיון"><i class="hdot"></i>XP<b id="gXP">0</b></span>
      <span class="hstat s-mist" title="טעויות פתוחות"><i class="hdot"></i>טעויות<b id="gMist">0</b></span>
    </div>
    <button class="iconbtn" id="themeBtn" onclick="toggleTheme()" title="מצב תצוגה" aria-label="מצב תצוגה">🌙</button>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>
<main class="wrap" id="app"></main>
<footer class="ft">🎮 יידיש-קוועסט · לפי חומרי הקורס · ההתקדמות נשמרת במכשיר שלך בלבד</footer>
<button class="btn gold floatbtn" onclick="go('tenmin')"><span>⚡</span><span class="lbl">10 דקות לפני מבחן</span></button>
<div class="toast" id="toast"></div>

<!-- ============ DATA BANK (inlined at build) ============ -->
<script>
// DATA.js — בנק האמת ליידיש-קוועסט. חולץ מילה-במילה מחומרי הקורס.
// מקור הטיות: 20_תרגולים/_פתרונות_מקור.md (עמ' 84 = 1–40, עמ' 100 = 41–60)
// מקור סיפורים: FINAL_YIDDISH_GUIDE_OUTPUT/STORIES_QA_WITH_ANSWERS.md
// מקור שיבוץ: 30_מבחנים/הכנה_למבחן/03_שאלות_שיבוץ.md
// אין להמציא — כל תוכן פעיל מגיע מהמקורות. needsReview=true מסמן סתירה לבדיקה מול המרצה.
window.YID = {
  CONJUGATION_BANK: [
    { id:1, sourcePage:84, infinitive:"לערנען", presentSentence:"איך לערן אין אוניווערסיטעט",
      translation:"אני לומד באוניברסיטה", past:"איך האָב געלערנט אין אוניווערסיטעט",

<script>
/* ---------- fallback so page never white-screens ---------- */
window.YID = window.YID || {CONJUGATION_BANK:[],STORIES:[],FILL_IN_BANK:[]};
const CB = YID.CONJUGATION_BANK||[], ST = YID.STORIES||[], FB = YID.FILL_IN_BANK||[];

/* ---------- persistent state ---------- */
const LSK='yidquest_v1';
const DEF={xp:0,theme:'light',conjDone:{},storyDone:{},fillDone:{},cardsKnown:{},mistakes:[],exams:[]};
let S=load();
function load(){try{return Object.assign({},DEF,JSON.parse(localStorage.getItem(LSK)||'{}'))}catch(e){return Object.assign({},DEF)}}
function save(){localStorage.setItem(LSK,JSON.stringify(S))}
function addXP(n){S.xp+=n;save();if(typeof updHeader==='function')updHeader()}

/* ---------- theme ---------- */
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeBtn').textContent=S.theme==='dark'?'☀️':'🌙'}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';save();applyTheme()}

/* ---------- Yiddish-tolerant comparison ---------- */
function norm(s){return (s||'').toString()
  .normalize('NFD').replace(/[֑-ׇ]/g,'')      /* strip niqqud/pesakh/komets/dagesh */
  .replace(/[.,!?;:'"״׳`\-–—()]/g,'')                    /* punctuation */
  .replace(/ֿ|ׁ|ׂ/g,'')
  .replace(/\s+/g,' ').trim().toLowerCase()}
function eqYi(a,b){return norm(a)===norm(b)}

/* ---------- tag labels ---------- */
const TAGLBL={pronoun:'כינוי גוף',hobn_zayn:'האָבן / זײַן',hobn:'עזר האָבן',zayn:'עזר זײַן',
  past_form:'עבר',future:'עתיד',imperative:'ציווי',zikh:'זיך',nisht_keyn:'נישט / קיין',
  prefix_split:'פועל מתפרק',prefix_fixed:'בלתי מתפרק',word_order:'סדר מילים',story:'סיפור',
  translation:'תרגום',regular:'רגיל',motion:'תנועה',irregular_past:'עבר חריג',
  no_double_t:'בלי טט',helper_expr:'ביטוי עזר',verb_form:'צורת פועל',preposition:'מילת יחס',question_word:'מילת שאלה',pronoun_verb:'כינוי↔פועל'};
function tagName(t){return TAGLBL[t]||t}

/* ---------- mistakes ---------- */
function logMistake(m){
  m.id='m'+Date.now()+Math.floor(performance.now()%1000);
  m.date=new Date().toISOString().slice(0,10); m.solved=false;
  S.mistakes.unshift(m); if(S.mistakes.length>400)S.mistakes.pop(); save();
}
function openMistakes(){return S.mistakes.filter(m=>!m.solved)}

/* ---------- toast ---------- */
let tT;
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),1600)}

/* ---------- router ---------- */
const TABS=[['home','🗺️ בית'],['conj','⚔️ הטיה'],['stories','📖 סיפורים'],['fill','🧩 שיבוצים'],['cards','📇 כרטיסיות'],['exam','📝 מבחן'],['mistakes','🧠 טעויות']];
let view='home', ctx={};
function go(v,c){view=v;ctx=c||{};location.hash=v;render()}
window.addEventListener('hashchange',()=>{const h=location.hash.slice(1);if(h&&h!==view){view=h;render()}});
function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(([k,l])=>`<button class="${k===view?'active':''}" onclick="go('${k}')">${l}</button>`).join('')}

function render(){
  renderTabs();
  const el=document.getElementById('app');
  const R={home:renderHome,conj:renderConj,conjOne:renderConjOne,stories:renderStories,
    story:renderStory,storyQuiz:renderStoryQuiz,fill:renderFill,cards:renderCards,
    exam:renderExam,examRun:renderExamRun,mistakes:renderMistakes,tenmin:renderTenmin};
  el.innerHTML='<div class="view">'+(R[view]||renderHome)()+'</div>';
  if(afterRender[view])afterRender[view]();
  updHeader();
  window.scrollTo(0,0);
}
const afterRender={};
function updHeader(){
  const c=Object.keys(S.conjDone).length, sq=Object.keys(S.storyDone).length, fi=Object.keys(S.fillDone).length;
  const totQ=CB.length + ST.reduce((a,s)=>a+(s.questions||[]).length,0) + FB.length;
  const p=totQ?Math.round((c+sq+fi)/totQ*100):0;
  const bar=document.getElementById('gpbar'); if(bar)bar.style.width=p+'%';
  const xp=document.getElementById('gXP'); if(xp)xp.textContent=S.xp;
  const mist=document.getElementById('gMist'); if(mist)mist.textContent=openMistakes().length;
}

/* ========================================================= HOME */
function pct(done,total){return total?Math.round(Object.keys(done).length/total*100):0}
function renderHome(){
  const c=Object.keys(S.conjDone).length, sq=Object.keys(S.storyDone).length, fi=Object.keys(S.fillDone).length;
  const totQ=CB.length + ST.reduce((a,s)=>a+(s.questions||[]).length,0) + FB.length;
  const doneQ=c+sq+fi;
  const p=totQ?Math.round(doneQ/totQ*100):0;
  const open=openMistakes().length;
  const cards=[['conj','⚔️','מנוע ההטיה','80% מהמבחן — 7 שורות לכל פועל'],
    ['stories','📖','סיפורים','3 סיפורים + שאלות הבנה'],
    ['fill','🧩','שיבוצים','נישט/קיין · מילות שאלה · יחס · פעלים'],
    ['cards','📇','כרטיסיות','חזרה מהירה'],
    ['exam','📝','מצב מבחן','סימולציה מלאה בטיימר'],
    ['mistakes','🧠','הטעויות שלי','תרגול לפי חולשות']];
  const totS=ST.reduce((a,s)=>a+(s.questions||[]).length,0);
  return `
  <div class="hero">
    <span class="logo">🎮</span>
    <h1>יידיש-קוועסט</h1>
    <div class="sub">מאמן למבחן ביידיש — לפי החומר האמיתי בלבד. אפס המצאה.</div>
    <div class="hero-cta">
      <button class="btn" onclick="go('conj')">▶ ${c?'המשך לתרגל':'התחל בהטיה'}</button>
      <button class="btn ghost" onclick="go('tenmin')">⚡ 10 דקות לפני מבחן</button>
    </div>
  </div>
  <div class="ringrow">
    <div class="ring" style="--p:${p}"><i>${p}%</i></div>
    <div class="stat" style="flex:1;justify-content:center">
      <div class="kpi"><b>${S.xp}</b><span>XP</span></div>
      <div class="kpi"><b>${c}/${CB.length}</b><span>משפטי הטיה</span></div>
      <div class="kpi"><b>${sq}/${totS}</b><span>שאלות סיפור</span></div>
      <div class="kpi"><b>${fi}/${FB.length}</b><span>שיבוצים</span></div>
      <div class="kpi"><b style="color:var(--coral)">${open}</b><span>טעויות פתוחות</span></div>
    </div>
  </div>
  <div class="banner">מפת הלמידה</div>
  <div class="grid">
    ${cards.map(([k,e,t,d])=>`<div class="tile" onclick="go('${k}')"><div class="emo">${e}</div><h3>${t}</h3><div class="sub">${d}</div></div>`).join('')}
  </div>
  <div class="card small muted" style="margin-top:18px">
    כל התוכן נשלף מ-${CB.length} משפטי ההטיה, ${ST.length} הסיפורים ובנק השיבוצים. עובד לגמרי offline; ההתקדמות נשמרת במכשיר שלך בלבד.
    <div style="margin-top:10px"><button class="btn ghost sm" onclick="resetAll()">איפוס התקדמות</button></div>
  </div>`;
}
function resetAll(){if(confirm('לאפס את כל ההתקדמות, ה-XP והטעויות? פעולה בלתי הפיכה.')){S=Object.assign({},DEF,{theme:S.theme});save();toast('אופס');go('home')}}

/* ========================================================= CONJUGATION LIST */
function renderConj(){
  return `<div class="card">
    <h2>⚔️ מנוע ההטיה</h2>
    <div class="sub">בחר משפט מתוך ${CB.length}. בכל משפט תמלא 7 שורות: תרגום · עבר · עתיד · ציווי · שלילה · שאלה + · שאלה –</div>
  </div>
  <div class="grid">
    ${CB.map(v=>{const done=S.conjDone[v.id];
      return `<div class="tile" onclick="go('conjOne',{id:${v.id}})">
        <div class="row" style="justify-content:space-between">
          <span class="pill">#${v.id} · עמ׳ ${v.sourcePage}</span>
          ${done?'<span class="pill green">✓</span>':''}
          ${v.needsReview?'<span class="pill red">דורש בדיקה</span>':''}
        </div>
        <div class="yi" style="font-size:19px;margin:8px 0 2px">${v.presentSentence}</div>
        <div class="sub">${v.infinitive} · ${v.translation||''}</div>
        <div>${(v.tags||[]).slice(0,3).map(t=>`<span class="tag">${tagName(t)}</span>`).join('')}</div>
      </div>`}).join('')}
  </div>`;
}

/* ========================================================= CONJUGATION ONE */
const ROWS=[['translation','תרגום','translation'],['past','עבר','past_form'],['future','עתיד','future'],
  ['imperative','ציווי','imperative'],['negative','שלילה','nisht_keyn'],
  ['positiveQuestion','שאלה +','word_order'],['negativeQuestion','שאלה –','word_order']];
let curLevel=3;
function renderConjOne(){
  const v=CB.find(x=>x.id===ctx.id); if(!v)return renderConj();
  const lv=ctx.level||curLevel; curLevel=lv;
  const hints=(v.tags||[]).map(tagName).join(' · ');
  let body='';
  if(lv===1) body=lvl1(v);
  else if(lv===2) body=lvl2(v);
  else body=lvl3(v);
  return `<div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="pill">#${v.id} · עמ׳ ${v.sourcePage}</span>
      <button class="btn ghost sm" onclick="go('conj')">→ חזרה לרשימה</button>
    </div>
    <h2 class="yi" style="font-size:24px">${v.presentSentence}</h2>
    <div class="sub">שם הפועל: <b>${v.infinitive}</b> · רמזים: ${hints}</div>
    ${v.needsReview?`<div class="review">⚠️ דורש בדיקה מול המרצה: ${v.reviewNote||''}</div>`:''}
    <div class="levels">
      <button class="${lv===1?'on':''}" onclick="go('conjOne',{id:${v.id},level:1})">רמה 1 · בחירה</button>
      <button class="${lv===2?'on':''}" onclick="go('conjOne',{id:${v.id},level:2})">רמה 2 · השלמה</button>
      <button class="${lv===3?'on':''}" onclick="go('conjOne',{id:${v.id},level:3})">רמה 3 · מבחן</button>
    </div>
    ${body}
  </div>`;
}
/* ---- level 3: type all 7 rows ---- */
function lvl3(v){
  return `<table class="conj"><tbody>
    ${ROWS.map(([f,l])=>`<tr><td class="lbl">${l}</td><td><input id="i_${f}" placeholder="הקלד/י..." autocomplete="off" spellcheck="false" class="yi"></td></tr>`).join('')}
  </tbody></table>
  <div class="row" style="margin-top:12px"><button class="btn" onclick="checkL3(${v.id})">בדוק</button>
  <button class="btn ghost sm" onclick="revealL3(${v.id})">גלה תשובות</button></div>
  <div id="res3"></div>`;
}
function checkL3(id){
  const v=CB.find(x=>x.id===id); let good=0,out='';
  ROWS.forEach(([f,l,tag])=>{
    const ua=(document.getElementById('i_'+f).value||'').trim();
    const ok=eqYi(ua,v[f]);
    if(ok){good++; out+=`<div class="rowres ok">✓ ${l}: <span class="yi">${v[f]}</span></div>`;}
    else{
      out+=`<div class="rowres bad">✗ ${l} — שלך: <span class="yi">${ua||'—'}</span><br>נכון: <span class="yi correct-line">${v[f]||'—'}</span>
        <button class="btn sm ghost" style="margin-top:4px" onclick="this.parentNode.classList.remove('bad');this.parentNode.classList.add('ok');bumpGood(${id})">בעצם צדקתי</button></div>`;
      if(ua) logMistake({sourceType:'conjugation',sourceId:id,userAnswer:ua,correctAnswer:v[f],explanation:explainRow(v,tag),tags:mergeTags(v,tag)});
    }
  });
  document.getElementById('res3').innerHTML=out+`<div class="expl">${v.explanation||'בדוק שוב את הגוף, פועל העזר בעבר (האָבן/זײַן) והשלילה (נישט/קיין).'}</div>`;
  markConjDone(id); addXP(good*4);
}
function bumpGood(id){addXP(4)}
function revealL3(id){const v=CB.find(x=>x.id===id);ROWS.forEach(([f])=>{const i=document.getElementById('i_'+f);if(i)i.value=v[f]||''});}
/* ---- level 1: choose correct row answer among real distractors ---- */
function lvl1(v){
  return ROWS.map(([f,l,tag],ri)=>{
    const others=CB.filter(x=>x.id!==v.id && x[f]).map(x=>x[f]);
    const opts=shuffle([v[f], ...pick(others,3)].filter(Boolean));
    return `<div class="card" style="box-shadow:none;margin:8px 0"><b>${l}</b>
      <div id="q1_${ri}">${opts.map(o=>`<button class="opt yi" onclick="ansL1(this,${v.id},${ri},'${b64(o)}')">${o}</button>`).join('')}</div></div>`;
  }).join('')+`<div id="res1"></div>`;
}
function ansL1(btn,id,ri,enc){
  const v=CB.find(x=>x.id===id); const [f,l,tag]=ROWS[ri];
  const val=ub64(enc); const box=document.getElementById('q1_'+ri);
  [...box.children].forEach(b=>b.disabled=true);
  if(eqYi(val,v[f])){btn.classList.add('right');addXP(3);}
  else{btn.classList.add('wrong');[...box.children].forEach(b=>{if(eqYi(b.textContent,v[f]))b.classList.add('right')});
    logMistake({sourceType:'conjugation',sourceId:id,userAnswer:val,correctAnswer:v[f],explanation:explainRow(v,tag),tags:mergeTags(v,tag)});}
  markConjDone(id);
}
/* ---- level 2: fill blank (auxiliary/negation token) ---- */
function lvl2(v){
  const rows=[['past','עבר'],['negative','שלילה'],['future','עתיד']].filter(([f])=>v[f]);
  return rows.map(([f,l],ri)=>{
    const toks=(v[f]||'').split(' ');
    let bi=toks.findIndex(t=>/^(האָב|האָבן|האָט|האָסט|בין|ביסט|איז|זײַנען|זיינען|זײַט|נישט|קיין|וועל|וועסט|וועט|וועלן)$/.test(norm(t)||t));
    if(bi<0)bi=1;
    const answer=toks[bi]; const shown=toks.map((t,i)=>i===bi?'<b style="color:var(--teal)">____</b>':t).join(' ');
    const pool=['האָב','בין','האָט','איז','נישט','קיין','וועל','וועט','זײַנען'].filter(x=>norm(x)!==norm(answer));
    const opts=shuffle([answer,...pick(pool,2)]);
    return `<div class="card" style="box-shadow:none;margin:8px 0"><b>${l}:</b> <span class="yi" style="font-size:18px">${shown}</span>
      <div id="q2_${ri}">${opts.map(o=>`<button class="opt yi" onclick="ansL2(this,${v.id},'${b64(answer)}','${b64((ROWS.find(r=>r[0]===f)||[])[2]||'past_form')}')">${o}</button>`).join('')}</div></div>`;
  }).join('')+`<div class="sub">מלא/י את המילה החסרה (פועל עזר או שלילה).</div>`;
}
function ansL2(btn,id,encA,encT){
  const v=CB.find(x=>x.id===id); const ans=ub64(encA),tag=ub64(encT);
  const box=btn.parentNode; [...box.children].forEach(b=>b.disabled=true);
  if(eqYi(btn.textContent,ans)){btn.classList.add('right');addXP(3);}
  else{btn.classList.add('wrong');[...box.children].forEach(b=>{if(eqYi(b.textContent,ans))b.classList.add('right')});
    logMistake({sourceType:'conjugation',sourceId:id,userAnswer:btn.textContent.trim(),correctAnswer:ans,explanation:explainRow(v,tag),tags:mergeTags(v,tag)});}
  markConjDone(id);
}
function markConjDone(id){S.conjDone[id]=1;save()}
function mergeTags(v,tag){const s=new Set([tag]);(v.tags||[]).forEach(t=>{if(['hobn_zayn','zayn','hobn','zikh','prefix_split','prefix_fixed','nisht_keyn','irregular_past'].includes(t))s.add(t==='hobn'||t==='zayn'?'hobn_zayn':t)});return [...s]}
function explainRow(v,tag){
  const E={
    hobn_zayn:'ביידיש חלק מפעלי התנועה/שינוי-מצב לוקחים בעבר את פועל העזר זײַן ולא האָבן. לכן "איך בין געגאַנגען", לא "איך האָב געגאַנגען".',
    zayn:'פועל תנועה — בעבר עם זײַן (איך בין / דו ביסט / ער איז / מיר-זיי זײַנען).',
    hobn:'פועל רגיל — בעבר עם האָבן (איך האָב / דו האָסט / ער האָט / מיר-זיי האָבן).',
    nisht_keyn:'קיין בא לפני שם עצם לא מיודע. נישט שולל פועל / תואר / משפט כללי, ואחרי מילת יחס אומרים "פֿון קיין / אין קיין".',
    prefix_split:'פועל מתפרק: בהווה ובציווי התחילית נפרדת; בעבר גע־ נכנס בין התחילית לפועל (אָפּקויפֿן → אָפּגעקויפֿט).',
    prefix_fixed:'פועל בלתי-מתפרק (באַ/פֿאַר/דער/צע/אַנט) — לא מקבל גע בעבר (פֿאַרקויפֿן → פֿאַרקויפֿט).',
    zikh:'זיך לא נעלם — הוא רק זז לפי הזמן והמבנה. בדוק היכן הוא צריך לעמוד ליד הפועל / פועל העזר.',
    word_order:'חוק V2 — הפועל המוטה תמיד במקום השני. בשאלת כן/לא הפועל עולה לראש; דו+פועל מתחברים ("גייסטו").',
    imperative:'ציווי: יחיד = השורש, רבים = +ט, בלי כינוי גוף.',
    future:'עתיד = וועלן + שם הפועל המלא (איך וועל לערנען).',
    translation:'בדוק את התרגום מול המשפט בהווה.',
    irregular_past:'צורת עבר חריגה — יש לזכור בעל-פה (למשל געגאַנגען, געקומען, געשריבן, גענומען).'
  };
  return E[tag]||v.explanation||'שים לב לגוף, פועל העזר בעבר, והשלילה.';
}

    </div>
    <div class="row" style="margin-top:8px">
      <label>טיימר: <select id="ex_timer"><option value="0">בלי</option><option value="20">20 דק׳</option><option value="30">30 דק׳</option><option value="45">45 דק׳</option></select></label>
      <button class="btn" onclick="startExam()">התחל מבחן</button>
    </div>
    ${S.exams.length?`<div class="banner">מבחנים אחרונים</div>${S.exams.slice(0,5).map(e=>`<div class="small">${e.date} · ציון כללי <b>${e.score}%</b> (א׳ ${e.a}% · ב׳ ${e.b}% · ג׳ ${e.c}%)</div>`).join('')}`:''}
  </div>`;
}
let EX=null,exTimer=null;
function startExam(){
  const nc=+document.getElementById('ex_conj').value, nf=+document.getElementById('ex_fill').value;
  let sid=document.getElementById('ex_story').value; if(sid==='rand')sid=ST[Math.floor(Object.keys(S.conjDone).length)%ST.length]?.id||ST[0].id;
  const mins=+document.getElementById('ex_timer').value;
  EX={conj:pick(CB.slice(),nc),story:ST.find(s=>s.id===sid),fill:pick(FB.slice(),nf),mins,left:mins*60,ans:{}};
  go('examRun');
  if(mins){clearInterval(exTimer);exTimer=setInterval(()=>{EX.left--;const t=document.getElementById('extime');if(t)t.textContent=fmt(EX.left);if(EX.left<=0){clearInterval(exTimer);submitExam()}},1000)}
}
function fmt(s){s=Math.max(0,s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function renderExamRun(){
  if(!EX)return renderExam();
  return `<div class="card">
    <div class="row" style="justify-content:space-between">
      <h2 style="margin:0">📝 מבחן</h2>
      ${EX.mins?`<span class="timerbox">⏱ <span id="extime">${fmt(EX.left)}</span></span>`:''}
    </div>
    <div class="banner">חלק א׳ — הטיה (${EX.conj.length})</div>
    ${EX.conj.map((v,qi)=>`<div class="card" style="box-shadow:none;margin:8px 0">
      <span class="pill">#${v.id}</span> <span class="yi" style="font-size:18px">${v.presentSentence}</span> <span class="sub">(${v.infinitive})</span>
      <table class="conj"><tbody>${ROWS.map(([f,l])=>`<tr><td class="lbl">${l}</td><td><input class="yi" id="ex_c${qi}_${f}" autocomplete="off" spellcheck="false"></td></tr>`).join('')}</tbody></table>
    </div>`).join('')}
    <div class="banner">חלק ב׳ — סיפור: <span class="yi">${EX.story.titleYiddish}</span></div>
    ${(EX.story.questions||[]).map((q,qi)=>`<div class="card" style="box-shadow:none;margin:8px 0">
      <span class="yi" style="font-size:17px">${q.questionYiddish}</span>
      <input class="yi" style="width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:6px" id="ex_s${qi}" placeholder="תשובה ביידיש...">
    </div>`).join('')}
    <div class="banner">חלק ג׳ — שיבוץ (${EX.fill.length})</div>
    ${EX.fill.map((it,qi)=>`<div class="card" style="box-shadow:none;margin:8px 0">
      <span class="yi" style="font-size:17px">${it.prompt}</span>
      <div>${shuffle(it.options.slice()).map(o=>`<button class="opt yi" data-q="${qi}" onclick="exFill(${qi},'${b64(o)}',this)">${o}</button>`).join('')}</div>
    </div>`).join('')}
    <button class="btn wide" onclick="submitExam()">סיים והצג ציון</button>
  </div>`;
}
function exFill(qi,enc,btn){EX.ans['f'+qi]=ub64(enc);[...btn.parentNode.children].forEach(b=>b.classList.remove('sel'));btn.classList.add('sel')}
function submitExam(){
  clearInterval(exTimer);
  let aG=0,aT=0,cG=0,cT=0;
  // part A
  EX.conj.forEach((v,qi)=>ROWS.forEach(([f,l,tag])=>{aT++;const ua=(document.getElementById('ex_c'+qi+'_'+f)||{}).value||'';if(eqYi(ua,v[f]))aG++;else if(ua)logMistake({sourceType:'exam',sourceId:v.id,userAnswer:ua,correctAnswer:v[f],explanation:explainRow(v,tag),tags:mergeTags(v,tag)})}));
  // part C
  EX.fill.forEach((it,qi)=>{cT++;const ua=EX.ans['f'+qi];if(eqYi(ua,it.correctAnswer))cG++;else if(ua)logMistake({sourceType:'exam',sourceId:it.id,userAnswer:ua,correctAnswer:it.correctAnswer,explanation:it.explanation||'',tags:(it.tags||[it.type])})});
  const a=aT?Math.round(aG/aT*100):0, c=cT?Math.round(cG/cT*100):0;
  const b='self'; // part B self-graded
  const score=Math.round((a*0.7)+(c*0.3)); // weight conjugation ~70%
  S.exams.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),score,a,b:'—',c});save();
  addXP(aG*2+cG*2);
  ctx.result={a,c,score,conj:EX.conj,fill:EX.fill,story:EX.story,ans:EX.ans};
  view='examRun';
  document.getElementById('app').innerHTML=examResult();window.scrollTo(0,0);
}
function examResult(){
  const r=ctx.result;
  const weak={};openMistakes().forEach(m=>(m.tags||[]).forEach(t=>weak[t]=(weak[t]||0)+1));
  const weakList=Object.entries(weak).sort((x,y)=>y[1]-x[1]).slice(0,5);
  return `<div class="card">
    <h2>📝 תוצאות</h2>
    <div class="stat">
      <div class="kpi"><b>${r.score}%</b><span>ציון משוקלל</span></div>
      <div class="kpi"><b>${r.a}%</b><span>חלק א׳ הטיה</span></div>
      <div class="kpi"><b>עצמי</b><span>חלק ב׳ סיפור</span></div>
      <div class="kpi"><b>${r.c}%</b><span>חלק ג׳ שיבוץ</span></div>
    </div>
    ${weakList.length?`<div class="banner">נושאים חלשים</div>${weakList.map(([t,n])=>`<span class="tag">${tagName(t)} · ${n}</span>`).join('')}`:''}
    <div class="banner">חלק ב׳ — תשובות מודל (בדוק/י את עצמך)</div>
    ${(r.story.questions||[]).map((q,qi)=>{const ua=(document.getElementById('ex_s'+qi)||{}).value||'';return `<div class="card small" style="box-shadow:none;margin:6px 0"><span class="yi">${q.questionYiddish}</span><br>שלך: <span class="yi">${ua||'—'}</span><br>מודל: <span class="yi" style="color:var(--green)">${q.modelAnswerYiddish}</span></div>`}).join('')}
    <div class="banner">פתרונות חלק א׳</div>
    ${r.conj.map(v=>`<div class="small" style="margin:4px 0">#${v.id} <span class="yi">${v.past}</span> · <span class="yi">${v.future}</span> · <span class="yi">${v.negative}</span></div>`).join('')}
    <div class="row" style="margin-top:12px">
      <button class="btn" onclick="go('exam')">מבחן חדש</button>
      <button class="btn ghost" onclick="practiceMistakes()">תרגל רק את הטעויות שלי</button>
    </div>
  </div>`;
}

/* ========================================================= MISTAKES */
function renderMistakes(){
  const open=openMistakes();
  const byTag={};open.forEach(m=>(m.tags||[]).forEach(t=>byTag[t]=(byTag[t]||0)+1));
  const sorted=Object.entries(byTag).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0];
  return `<div class="card">
    <h2>🧠 הטעויות שלי</h2>
    <div class="stat">
      <div class="kpi"><b>${open.length}</b><span>טעויות פתוחות</span></div>
      <div class="kpi"><b>${S.mistakes.filter(m=>m.solved).length}</b><span>נפתרו</span></div>
      ${top?`<div class="kpi"><b>${tagName(top[0])}</b><span>הכי חוזרת (${top[1]})</span></div>`:''}
    </div>
    ${sorted.length?`<div class="banner">טעויות לפי נושא</div>${sorted.map(([t,n])=>`<div class="barrow"><span style="min-width:120px">${tagName(t)}</span><span class="bar"><i style="width:${Math.round(n/open.length*100)}%"></i></span><b>${n}</b></div>`).join('')}`:'<div class="muted">אין טעויות פתוחות — כל הכבוד! 🎉</div>'}
    <div class="row" style="margin-top:12px">
      ${open.length?`<button class="btn" onclick="practiceMistakes()">תרגל רק את מה שטעיתי</button>`:''}
      <button class="btn ghost sm" onclick="clearSolved()">נקה טעויות פתורות</button>
    </div>
  </div>
  ${open.map(m=>`<div class="card" style="margin:8px 0" id="mk_${m.id}">
    <div class="row" style="justify-content:space-between">
      <div>${(m.tags||[]).map(t=>`<span class="tag">${tagName(t)}</span>`).join('')}</div>
      <span class="sub">${m.date} · ${m.sourceType}</span>
    </div>
    <div class="small" style="margin-top:6px"><b>התשובה שלך:</b> <span class="yi bad" style="padding:2px 6px;border-radius:4px">${m.userAnswer||'—'}</span></div>
    <div class="small"><b>נכון:</b> <span class="yi" style="color:var(--green)">${m.correctAnswer||'—'}</span></div>
    ${m.explanation?`<div class="expl small">${m.explanation}</div>`:''}
    <div class="row" style="margin-top:8px">
      ${m.sourceType==='conjugation'||m.sourceType==='flashcard'||m.sourceType==='exam'?`<button class="btn sm ghost" onclick="retryMistake('${m.id}')">תרגל שוב</button>`:''}
      <button class="btn sm" onclick="solveMistake('${m.id}')">סמן כנפתר ✓</button>
    </div>
  </div>`).join('')}`;
}
function solveMistake(id){const m=S.mistakes.find(x=>x.id===id);if(m)m.solved=true;save();render()}
function clearSolved(){S.mistakes=S.mistakes.filter(m=>!m.solved);save();toast('נוקה');render()}
function retryMistake(id){const m=S.mistakes.find(x=>x.id===id);if(m&&typeof m.sourceId==='number'){go('conjOne',{id:m.sourceId,level:3})}else toast('פתח מהמנוע המתאים')}
function practiceMistakes(){
  const ids=[...new Set(openMistakes().filter(m=>typeof m.sourceId==='number').map(m=>m.sourceId))];
  if(!ids.length){toast('אין הטיות פתוחות לתרגול');return}
  go('conjOne',{id:ids[0],level:3});toast('מתרגלים את הטעויות — '+ids.length+' משפטים');
}

/* ========================================================= 10 MINUTES */
function renderTenmin(){
  return `<div class="card">
    <button class="btn ghost sm" onclick="go('home')">→ בית</button>
    <h1>⚡ 10 דקות לפני מבחן</h1>
    <div class="sub">כללי זהב — קצר וחד.</div>
    <div class="banner">הטיה — הסדר שבו פותרים</div>
    <ul class="golden">
      <li>קודם לזהות גוף: איך · דו · ער · זי · עס · מיר · איר · זיי</li>
      <li>הפועל המוטה תמיד במקום השני (חוק V2)</li>
      <li>בעבר — האָבן או זײַן? פעלי תנועה/שינוי-מצב → זײַן ("איך בין געגאַנגען")</li>
      <li>יש זיך? הוא לא נעלם — למקם אותו נכון</li>
      <li>פועל מתפרק? בעבר גע־ נכנס באמצע (אָפּ<b>גע</b>קויפֿט)</li>
      <li>בלתי-מתפרק (באַ/פֿאַר/דער/צע/אַנט)? בלי גע בכלל</li>
      <li>עתיד = וועלן + שם הפועל המלא</li>
      <li>ציווי: יחיד = שורש, רבים = +ט, בלי כינוי גוף</li>
    </ul>
    <div class="banner">שלילה</div>
    <ul class="golden">
      <li><b>נישט</b> = שלילת פועל / תואר / משפט</li>
      <li><b>קיין</b> = לפני שם עצם לא מיודע</li>
      <li>אחרי מילת יחס: "פֿון קיין", "אין קיין", "מיט קיין"</li>
    </ul>
    <div class="banner">שאלות</div>
    <ul class="golden">
      <li>שאלה +: מילת שאלה / צי, הפועל עולה קדימה</li>
      <li>שאלה –: כן/לא, הפועל ראשון; דו+פועל מתחברים ("גייסטו")</li>
    </ul>
    <div class="banner">סיפורים</div>
    <ul class="golden">
      <li>קרא את השאלה לאט, זהה על מי היא</li>
      <li>ענה ביידיש קצר ופשוט, במילים מהסיפור</li>
      <li>אל תמציא תשובה ארוכה</li>
    </ul>
  </div>`;
}

/* ---------- helpers ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor((Math.sin(i*99+a.length)*10000%1+1)%1*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(a,n){return shuffle(a).slice(0,n)}
function b64(s){return btoa(unescape(encodeURIComponent(s)))}
function ub64(s){return decodeURIComponent(escape(atob(s)))}

/* ---------- boot ---------- */
applyTheme();
const h=location.hash.slice(1); if(h)view=h;
if(!CB.length){document.getElementById('app').innerHTML='<div class="card"><h2>⏳ טוען נתונים…</h2><div class="sub">קובץ DATA.js לא נטען. ודא שהוא באותה תיקייה, או שהוטמע בקובץ.</div></div>';renderTabs();}
else render();
</script>
