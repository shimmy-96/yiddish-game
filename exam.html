<!doctype html>
<html lang="he" dir="rtl">
<head>

<title>יידיש — מבחן מעורבב של כל ההטיות</title>
<style>
  :root{
    --ink:#1a1a1a; --muted:#5a5a5a; --line:#c9c4b8; --soft:#efe9dc;
    --bg:#fbf8f1; --card:#fffdf7; --accent:#7a2e2e; --accent2:#2e4b7a;
    --good:#1f6b3a; --warn:#8a5a00;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
  body{font-family:"Times New Roman","Frank Ruehl",Georgia,serif;line-height:1.55;font-size:16px}
  .yid{font-family:"SBL Hebrew","Times New Roman",serif;font-size:1.06em;letter-spacing:.2px}
  .wrap{max-width:900px;margin:0 auto;padding:24px 22px 60px}
  header.doc{text-align:center;border-bottom:3px double var(--accent);padding-bottom:14px;margin-bottom:22px}
  header.doc .uni{font-size:14px;color:var(--muted);letter-spacing:1px}
  header.doc h1{margin:6px 0 2px;font-size:27px;color:var(--accent)}
  header.doc .sub{color:var(--muted);font-size:14px}
  h2.sec{background:var(--accent);color:#fff;padding:8px 14px;border-radius:6px;margin:30px 0 14px;font-size:20px}
  h2.sec.blue{background:var(--accent2)}
  table{border-collapse:collapse;width:100%;margin:6px 0;background:var(--card);font-size:15px}
  td{border:1px solid var(--line);padding:6px 9px;text-align:right;vertical-align:top}
  .k{white-space:nowrap;font-weight:bold;background:#f6f1e6;width:110px}
  .fields{display:flex;gap:26px;flex-wrap:wrap;justify-content:center;margin:10px 0 4px;color:var(--muted);font-size:14px}
  .fields span{border-bottom:1px solid var(--line);min-width:150px;padding-bottom:2px}
  .qnum{display:inline-block;background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;line-height:26px;text-align:center;font-size:14px;margin-left:6px}
  .lvl{font-size:12px;color:#fff;background:var(--muted);border-radius:10px;padding:1px 8px;margin-inline-start:6px;vertical-align:middle}
  .blankt td{height:30px}
  .answers{background:#f3f7f1}
  .why{background:#fff6ea;border-right:4px solid var(--warn);padding:6px 11px;border-radius:4px;margin:2px 0 16px;font-size:13.5px}
  .qhead{font-weight:bold;margin:16px 0 4px}
  @media print{
    body{font-size:12.5px} .wrap{max-width:none;padding:0 10px}
    h2.sec{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .answers,.why{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .page-break{page-break-before:always}
    td{padding:4px 6px}
    .qblock{page-break-inside:avoid}
  }
</style>
</head>
<body>
<div class="wrap">

<header class="doc">
  <div class="uni">אוניברסיטת בר־אילן · יידיש למתחילים (שנתי) · גב' ורד קופל</div>
  <h1>מבחן מעורבב — כל ההטיות</h1>
  <div class="sub">15 פעלים, מכל 7 הרמות, בסדר מעורבב · מלא/י את שבע השורות לכל פועל</div>
</header>
<div class="fields"><span>שם: __________</span><span>ת.ז.: __________</span><span>ציון: ______</span></div>

<h2 class="sec">המבחן</h2>
<div id="exam"></div>

<div class="page-break"></div>
<h2 class="sec blue">מפתח תשובות מלא + הסברים</h2>
<div id="key"></div>

<p style="text-align:center;color:var(--muted);margin-top:36px;font-size:13px">כל התוכן מבוסס על 60 משפטי המקור (עמ' 84 + 100) · אין המצאות.</p>
</div>

<script>
var ROWS=["תרגום","עבר","עתיד","ציווי","שלילה","שאלה +","שאלה −"];
var V=[
 {inf:"נעמען",lvl:4,sent:"די חברטע נעמט אַ בוך",
  a:["החברה לוקחת ספר","די חברטע האָט גענומען אַ בוך","די חברטע וועט נעמען אַ בוך","נעם! / נעמט!","די חברטע נעמט נישט קיין בוך","וואָס נעמט די חברטע? / צי נעמט די חברטע אַ בוך?","נעמט די חברטע אַ בוך?"],
  why:"חריג (רמה 4): עבר גענומען — שינוי פנימי, לא געˑˑˑט. עזר האָבן. מושא אַ בוך בלתי מיודע → נישט קיין."},
 {inf:"גיין",lvl:2,sent:"דו גייסט מיט די קינדער אַהײַם",
  a:["אתה הולך עם הילדים הביתה","דו ביסט געגאַנגען מיט די קינדער אַהײַם","דו וועסט גיין מיט די קינדער אַהײַם","גיי! / גייט!","דו גייסט נישט מיט די קינדער אַהײַם","וווּהין גייסטו? / צי גייסטו מיט די קינדער אַהײַם?","גייסטו מיט די קינדער אַהײַם?"],
  why:"תנועה (רמה 2) → עזר זײַן: דו ביסט. עבר חריג געגאַנגען. בשאלה דו+גיי מתמזג → גייסטו. מיודע (די קינדער) → רק נישט."},
 {inf:"דערציילן",lvl:6,sent:"איך דערצייל אַ סך מעשיות",
  a:["אני מספר הרבה מעשיות","איך האָב דערציילט אַ סך מעשיות","איך וועל דערציילן אַ סך מעשיות","דערצייל! / דערציילט!","איך דערצייל נישט קיין סך מעשיות","צי דערצייל איך אַ סך מעשיות?","דערצייל איך אַ סך מעשיות?"],
  why:"מורחב בלתי מתפרק (דערˑ, רמה 6) → אין גע בעבר: דערציילט. עזר האָבן. כמות לא מוגדרת (אַ סך) → נישט קיין."},
 {inf:"קומען",lvl:2,sent:"דו קומסט אַהיים זייער שפּעט",
  a:["אתה בא הביתה מאוד מאוחר","דו ביסט געקומען אַהיים זייער שפּעט","דו וועסט קומען אַהיים זייער שפּעט","קום! / קומט!","דו קומסט נישט אַהיים זייער שפּעט","ווען קומסטו אַהיים? / צי קומסטו אַהיים?","קומסטו אַהיים זייער שפּעט?"],
  why:"תנועה → זײַן: דו ביסט. עבר געקומען. דו+קומסט → קומסטו. אין מושא ספיר → רק נישט."},
 {inf:"אַרבעטן",lvl:1,sent:"די לערערס אַרבעטן מיט אַ סך תלמידים",
  a:["המורים עובדים עם הרבה תלמידים","די לערערס האָבן געאַרבעט מיט אַ סך תלמידים","די לערערס וועלן אַרבעטן מיט אַ סך תלמידים","אַרבעט! (יחיד=רבים)","די לערערס אַרבעטן נישט מיט קיין סך תלמידים","מיט וויפֿל תלמידים אַרבעטן די לערערס? / צי אַרבעטן זיי מיט אַ סך תלמידים?","אַרבעטן די לערערס מיט אַ סך תלמידים?"],
  why:"פשוט (רמה 1) אבל נגמר ב־ט → אין ט נוסף בעבר (געאַרבעט), וציווי יחיד=רבים. כמות לא מוגדרת → נישט קיין."},
 {inf:"אָפּקויפֿן",lvl:5,sent:"זיי קויפֿן אָפּ די נײַע ביכער",
  a:["הם משלימים/קונים את הספרים החדשים","זיי האָבן אָפּגעקויפֿט די נײַע ביכער","זיי וועלן אָפּקויפֿן די נײַע ביכער","קויף אָפּ! / קויפֿט אָפּ!","זיי קויפֿן נישט אָפּ די נײַע ביכער","וואָס קויפֿן זיי אָפּ? / צי קויפֿן זיי אָפּ די נײַע ביכער?","קויפֿן זיי אָפּ די נײַע ביכער?"],
  why:"מורחב מתפרק (אָפּ, רמה 5): התחילית לסוף בהווה/ציווי, וה־גע באמצע → אָפּגעקויפֿט. עזר האָבן. מיודע (די) → רק נישט אָפּ."},
 {inf:"זײַן",lvl:3,sent:"זי איז די שענסטע אין קלאַס",
  a:["היא הכי יפה בכיתה","זי איז געווען די שענסטע אין קלאַס","זי וועט זײַן די שענסטע אין קלאַס","זײַ! / זײַט!","זי איז נישט די שענסטע אין קלאַס","צי איז זי די שענסטע אין קלאַס?","איז זי די שענסטע אין קלאַס?"],
  why:"אוגד זײַן (רמה 3): ההטיה על זײַן עצמו — זי איז / וועט זײַן. עבר איז געווען. מיודע → רק נישט."},
 {inf:"שרײַבן",lvl:4,sent:"ער שרײַבט אַ בריוו צו זײַן קוזין",
  a:["הוא כותב מכתב לבן דודו","ער האָט געשריבן אַ בריוו צו זײַן קוזין","ער וועט שרײַבן אַ בריוו צו זײַן קוזין","שרײַב! / שרײַבט!","ער שרײַבט נישט קיין בריוו צו זײַן קוזין","צי שרײַבט ער אַ בריוו? / וואָס שרײַבט ער?","שרײַבט ער אַ בריוו?"],
  why:"חריג (רמה 4): עבר געשריבן — הי' יורדת, בלי ט. עזר האָבן. אַ בריוו בלתי מיודע → נישט קיין."},
 {inf:"פֿאָרן",lvl:2,sent:"די חברים פֿאָרן אויף אַ וויזיט קיין חיפה",
  a:["החברים נוסעים לביקור בחיפה","די חברים זײַנען געפֿאָרן אויף אַ וויזיט קיין חיפה","די חברים וועלן פֿאָרן אויף אַ וויזיט קיין חיפה","פֿאָר! / פֿאָרט!","די חברים פֿאָרן נישט אויף קיין וויזיט קיין חיפה","וווּהין פֿאָרן די חברים? / צי פֿאָרן זיי אויף אַ וויזיט?","פֿאָרן די חברים אויף אַ וויזיט קיין חיפה?"],
  why:"לנסוע = תנועה → זײַן: זײַנען געפֿאָרן. אַ וויזיט בלתי מיודע → נישט אויף קיין."},
 {inf:"באַקענען זיך",lvl:7,sent:"איך באַקען זיך מיט נײַע חברים",
  a:["אני עורך היכרות עם חברים חדשים","איך האָב באַקענט זיך מיט נײַע חברים","איך וועל באַקענען זיך מיט נײַע חברים","באַקען זיך! / באַקענט זיך!","איך באַקען זיך נישט מיט קיין נײַע חברים","צי באַקען איך זיך מיט נײַע חברים?","באַקען איך זיך מיט נײַע חברים?"],
  why:"מורחב בלתי מתפרק + זיך (רמה 7): אין גע (באַקענט), וה־זיך נשמר בכל צורה. נײַע חברים בלתי מיודע → נישט מיט קיין."},
 {inf:"האָבן",lvl:3,sent:"מיר האָבן דרײַ קינדער",
  a:["יש לנו שלושה ילדים","מיר האָבן געהאַט דרײַ קינדער","מיר וועלן האָבן דרײַ קינדער","האָב! / האָט!","מיר האָבן נישט קיין דרײַ קינדער","וויפֿל קינדער האָבן מיר? / צי האָבן מיר דרײַ קינדער?","האָבן מיר דרײַ קינדער?"],
  why:"האָבן כפועל ראשי (רמה 3): עבר געהאַט. כמות (דרײַ) → נישט קיין."},
 {inf:"אויסטראַכטן",lvl:5,sent:"מיר טראַכטן אויס אַ פּאַטענט",
  a:["אנחנו ממציאים פטנט","מיר האָבן אויסגעטראַכט אַ פּאַטענט","מיר וועלן אויסטראַכטן אַ פּאַטענט","טראַכט אויס! (יחיד=רבים)","מיר טראַכטן נישט אויס קיין פּאַטענט","צי טראַכטן מיר אויס אַ פּאַטענט?","טראַכטן מיר אויס אַ פּאַטענט?"],
  why:"מורחב מתפרק (אויס, רמה 5): גע באמצע, אבל נגמר ב־ט → אין ט נוסף (אויסגעטראַכט). אַ פּאַטענט → נישט קיין."},
 {inf:"ווערן דורשטיק",lvl:3,sent:"מיר ווערן דורשטיק נאָך מיטאָג",
  a:["אנחנו נעשים צמאים אחר הצהריים","מיר זײַנען געוואָרן דורשטיק נאָך מיטאָג","מיר וועלן ווערן דורשטיק נאָך מיטאָג","ווער דורשטיק! / ווערט דורשטיק!","מיר ווערן נישט דורשטיק נאָך מיטאָג","צי ווערן מיר דורשטיק נאָך מיטאָג?","ווערן מיר דורשטיק נאָך מיטאָג?"],
  why:"ווערן (רמה 3) לוקח זײַן: זײַנען געוואָרן. רק ווערן מוטה — התואר דורשטיק נשאר קבוע."},
 {inf:"שווימען",lvl:2,sent:"דו שווימסט אין אַ באַסיין",
  a:["אתה שוחה בבריכה","דו ביסט געשווומען אין אַ באַסיין","דו וועסט שווימען אין אַ באַסיין","שווים! / שווימט!","דו שווימסט נישט אין קיין באַסיין","צי שווימסטו אין אַ באַסיין?","שווימסטו אין אַ באַסיין?"],
  why:"תנועה → זײַן; חילוף פנימי געשווומען. דו+שווימסט → שווימסטו. אַ באַסיין בלתי מיודע → נישט אין קיין."},
 {inf:"פֿאַרקויפֿן",lvl:6,sent:"ער פֿאַרקויפֿט זײַן שטוב",
  a:["הוא מוכר את ביתו","ער האָט פֿאַרקויפֿט זײַן שטוב","ער וועט פֿאַרקויפֿן זײַן שטוב","פֿאַרקויף! / פֿאַרקויפֿט!","ער פֿאַרקויפֿט נישט זײַן שטוב","וואָס פֿאַרקויפֿט ער? / צי פֿאַרקויפֿט ער זײַן שטוב?","פֿאַרקויפֿט ער זײַן שטוב?"],
  why:"מורחב בלתי מתפרק (פֿאַר, רמה 6) → אין גע: פֿאַרקויפֿט. עזר האָבן. זײַן שטוב מיודע → רק נישט."}
];

function block(v,i,ans){
  var h='<div class="qblock"><div class="qhead">'
    +'<span class="qnum">'+(i+1)+'</span> '
    +'<span class="yid" style="font-size:1.1em">'+v.sent+'</span> · '
    +'<span class="yid" style="color:#7a2e2e">'+v.inf+'</span>'
    +'<span class="lvl">רמה '+v.lvl+'</span></div>';
  h+='<table'+(ans?' class="answers"':' class="blankt"')+'>';
  for(var r=0;r<ROWS.length;r++){
    var val=ans?(r===0?v.a[r]:'<span class="yid">'+v.a[r]+'</span>'):'';
    h+='<tr><td class="k">'+ROWS[r]+'</td><td>'+val+'</td></tr>';
  }
  h+='</table>';
  if(ans) h+='<div class="why"><b>למה:</b> '+v.why+'</div>';
  h+='</div>';
  return h;
}
var ex="",ky="";
for(var i=0;i<V.length;i++){ex+=block(V[i],i,false);ky+=block(V[i],i,true);}
document.getElementById("exam").innerHTML=ex;
document.getElementById("key").innerHTML=ky;
</script>
</body>
</html>
